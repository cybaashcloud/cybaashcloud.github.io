name: Deploy CYBAASH AI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/sync.yml'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install admin dependencies
        working-directory: frontend/admin
        run: npm ci --no-audit --no-fund

      - name: Build admin panel
        working-directory: frontend/admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      - name: Verify admin build output
        run: |
          test -d frontend/admin/dist || { echo "ERROR: frontend/admin/dist/ missing"; exit 1; }
          test -f frontend/admin/dist/index.html || { echo "ERROR: admin dist/index.html missing"; exit 1; }
          echo "Admin build OK: $(find frontend/admin/dist -type f | wc -l) files"

      - name: Assemble _site
        run: |
          set -euo pipefail
          mkdir -p _site/portfolio _site/admin _site/icons _site/ai

          # ── Core HTML pages ───────────────────────────────────────────
          cp frontend/index.html        _site/index.html
          cp frontend/recruiter.html    _site/recruiter.html
          cp frontend/dashboard.html    _site/dashboard.html
          cp frontend/offline.html      _site/offline.html

          # ── Cyberbot ──────────────────────────────────────────────────
          cp -r frontend/ai/. _site/ai/

          # ── JS / CSS ──────────────────────────────────────────────────
          cp frontend/cybaash-ai.js      _site/cybaash-ai.js
          cp frontend/cybaash-ai.css     _site/cybaash-ai.css
          cp frontend/script.js          _site/script.js
          cp frontend/github.js          _site/github.js
          cp frontend/saas-integration.js _site/saas-integration.js
          [ -f frontend/style.css          ] && cp frontend/style.css          _site/style.css          || true
          [ -f frontend/mobile.css ] && cp frontend/mobile.css _site/mobile.css || true
          [ -f frontend/mobile.js  ] && cp frontend/mobile.js  _site/mobile.js  || true
          # Root-level AI script
          [ -f frontend/ai-script.js ] && cp frontend/ai-script.js _site/ai-script.js || true
          [ -f frontend/cybaash_chatbot.js ] && cp frontend/cybaash_chatbot.js _site/cybaash_chatbot.js || true

          # ── Portfolio images ──────────────────────────────────────────
          [ -f frontend/avatar.png           ] && cp frontend/avatar.png           _site/portfolio/avatar.png           || true
          [ -f frontend/li-logo.jpg          ] && cp frontend/li-logo.jpg          _site/portfolio/li-logo.jpg          || true
          [ -f frontend/project_eatpqa2f.png ] && cp frontend/project_eatpqa2f.png _site/portfolio/project_eatpqa2f.png || true

          # ── Data files → portfolio/ AND root (both paths used by app) ─
          for f in data_main.json data_creds_1.json data_creds_2.json data_creds_3.json data_creds_4.json data_creds_5.json; do
            if [ -f "frontend/$f" ]; then
              cp "frontend/$f" "_site/portfolio/$f"
              cp "frontend/$f" "_site/$f"
              echo "OK $f"
            else
              echo "SKIP $f"
            fi
          done

          # ── Admin panel ───────────────────────────────────────────────
          cp -r frontend/admin/dist/. _site/admin/

          # ── AI config ─────────────────────────────────────────────────
          [ -f frontend/data_ai_config.json ] && cp frontend/data_ai_config.json _site/data_ai_config.json || true

          # ── Certificates (all types: LinkedIn, Cisco, AWS, etc.) ──────
          if [ -d frontend/certificates ]; then
            mkdir -p _site/certificates
            cp -r frontend/certificates/. _site/certificates/
            echo "OK certificates/ ($(find frontend/certificates -type f | wc -l) files)"
          else
            echo "SKIP certificates/"
          fi

          # ── Cert logos (pro012–pro024 thumbnail images) ───────────────
          if [ -d frontend/cert_logos ]; then
            mkdir -p _site/cert_logos
            cp -r frontend/cert_logos/. _site/cert_logos/
            echo "OK cert_logos/ ($(find frontend/cert_logos -type f | wc -l) files)"
          else
            echo "SKIP cert_logos/"
          fi

          # ── PWA manifest + service worker ────────────────────────────
          cp frontend/manifest.json _site/manifest.json
          cp frontend/sw.js         _site/sw.js
          cp frontend/_headers      _site/_headers

          # ── Icons ─────────────────────────────────────────────────────
          find frontend/icons \( -name '*.png' -o -name '*.ico' \) | while read -r icon; do
            cp "$icon" "_site/icons/$(basename "$icon")"
          done

          touch _site/.nojekyll

          # ── Validate critical files ───────────────────────────────────
          echo "=== Validating _site ==="
          test -f _site/index.html               || { echo "MISSING: index.html";               exit 1; }
          test -f _site/admin/index.html         || { echo "MISSING: admin/index.html";         exit 1; }
          test -f _site/portfolio/data_main.json || { echo "MISSING: portfolio/data_main.json"; exit 1; }
          test -f _site/data_main.json           || { echo "MISSING: root data_main.json";      exit 1; }
          test -f _site/cybaash-ai.js            || { echo "MISSING: cybaash-ai.js";            exit 1; }
          echo "All critical files present."
          echo "Total files: $(find _site -type f | wc -l)"

      - name: Sanitize AI config
        run: python3 scripts/deploy_ai_config.py

      - name: Stamp SW cache version
        run: |
          python3 scripts/stamp_sw_version.py _site/sw.js "${{ github.sha }}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
