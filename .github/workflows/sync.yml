name: Sync Credential Skills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show changes without saving'
        required: false
        default: false
        type: boolean
      credly_username:
        description: 'Credly username'
        required: false
        default: 'mohamedaasiq07'
        type: string
      file:
        description: 'Only process one creds file (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
  schedule:
    - cron: '30 3 * * 0'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr --quiet
          pip install requests pillow pytesseract

      - name: Write sync script
        run: |
          cat > sync_skills.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          sync_skills.py  v5  — verified correct pill detection
          ───────────────────────────────────────────────────────
          Root cause of all previous broken tags:
            PILL_GAP was set to (100 * scale) = 300px, but actual between-pill
            gap in the 3x-scaled image is only ~152px. Threshold was always too
            high so every line was returned as one merged blob.

          Fix: PILL_GAP = 80  (plain pixels in the already-scaled crop, no multiplication)
            Between-pill gaps in 3x image: ~152px  → split  ✓
            Within-pill gaps in 3x image:  ~16-25px → stay   ✓

          CREDLY badges
            Fetches live from public endpoint:
              https://www.credly.com/users/<username>/badges.json
            badge_template.skills gives real issuer-provided skill names.
            No API key needed. Profile must be public.

          LINKEDIN / cert images
            OCR → per-line bounding-box gap split → clean noise → deduplicate.
            Strips: "Shea Hanson", "Certificate ID:", footer symbols, junk.
            Fixes: Al→AI, Ml→ML, NET→.NET, incomplete trailing parens.

          NO issuer names added as tags (they are not skills).
          """

          import argparse, json, os, re, time
          from pathlib import Path
          import requests
          from PIL import Image, ImageEnhance
          import pytesseract

          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; skill-sync/5.0)",
                     "Accept": "application/json"}
          TIMEOUT = 20
          DELAY   = 1.0

          # Strings that must never appear as tags
          NOISE_SUBSTRINGS = [
              'shea hanson', 'certificate', 'learning content strategy',
              'oours', 'hte,', "et'", 'completed by', 'utc +', 'utc -',
              'utc «', 'courses,', 'linkedin', 'credly', 'mozilla',
          ]

          # ── Credly live fetch ──────────────────────────────────────────────────

          def fetch_credly(username: str) -> dict[str, list[str]]:
              """
              Fetches all pages of /users/<username>/badges.json
              Returns {badge_id: [skill, ...]} indexed by both earner-id and template-id.
              """
              result: dict[str, list[str]] = {}
              page = 1
              print(f"\n  Fetching Credly: {username}")

              while True:
                  url = (f"https://www.credly.com/users/{username}/badges.json"
                         f"?page={page}&page_size=48")
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                  except Exception as e:
                      print(f"  ✗ Credly error page {page}: {e}"); break

                  if r.status_code == 404:
                      print(f"  ✗ Profile not found: {username}"); break
                  if r.status_code != 200:
                      print(f"  ✗ HTTP {r.status_code}"); break

                  try:
                      payload = r.json()
                  except Exception as e:
                      print(f"  ✗ JSON parse error: {e}"); break

                  badges = payload.get("data", [])
                  if not badges:
                      break

                  for b in badges:
                      eid  = b.get("id", "")
                      tmpl = b.get("badge_template", {})
                      tid  = tmpl.get("id", "")
                      skills = [s["name"].strip()
                                for s in tmpl.get("skills", [])
                                if s.get("name", "").strip()]
                      if eid:  result[eid]  = skills
                      if tid:  result[tid]  = skills

                  print(f"    page {page}: {len(badges)} badges")
                  meta = payload.get("metadata", {})
                  if page * meta.get("per", 48) >= meta.get("total_count", 0):
                      break
                  page += 1
                  time.sleep(DELAY)

              print(f"  Done: {len(result)//2} badges\n")
              return result

          # ── OCR pill extraction ────────────────────────────────────────────────

          def clean_pill(p: str) -> str:
              p = re.sub(r'\bAl\b',  'AI', p)   # OCR l→I
              p = re.sub(r'\bMl\b',  'ML', p)
              p = re.sub(r'\bNET\b', '.NET', p)  # OCR drops leading dot
              # Strip incomplete trailing open-paren  e.g. "(Programming Language" → "Python"
              # Only strip if paren is never closed
              if '(' in p and ')' not in p:
                  p = re.sub(r'\s*\([^)]*$', '', p)
              p = p.strip(' ()[]|~*.,\'"')
              p = re.sub(r'\s+', ' ', p).strip()
              return p

          def is_noise(p: str) -> bool:
              if len(p) < 3: return True
              if not re.match(r'[A-Za-z.]', p): return True
              pl = p.lower()
              return any(ns in pl for ns in NOISE_SUBSTRINGS)

          def ocr_pills(img_path: Path) -> list[str]:
              try:
                  img = Image.open(img_path).convert('RGB')
              except Exception as e:
                  print(f"    cannot open: {e}"); return []

              w, h = img.size

              for zone in [(0, int(h*.50), w, int(h*.72)),
                           (0, int(h*.44), w, int(h*.68))]:
                  crop = img.crop(zone)
                  scale = 3
                  crop = crop.resize((crop.width*scale, crop.height*scale), Image.LANCZOS)
                  crop = ImageEnhance.Contrast(crop).enhance(2.5).convert('L')
                  data = pytesseract.image_to_data(
                      crop, config='--psm 6', output_type=pytesseract.Output.DICT)

                  words = []
                  for i, word in enumerate(data['text']):
                      if not word.strip() or int(data['conf'][i]) < 20: continue
                      words.append({'word':  word,
                                    'left':  data['left'][i],
                                    'top':   data['top'][i],
                                    'right': data['left'][i]+data['width'][i]})
                  if not words: continue

                  # Group words into lines
                  LINE_TOL = 75
                  lines: dict[int, list] = {}
                  for wp in words:
                      key = round(wp['top']/LINE_TOL)*LINE_TOL
                      lines.setdefault(key, []).append(wp)

                  found_header = False
                  all_pills: list[str] = []

                  for key in sorted(lines):
                      lw  = sorted(lines[key], key=lambda x: x['left'])
                      ltx = ' '.join(w['word'] for w in lw)

                      if re.search(r'top\s+skills?\s+covered', ltx, re.IGNORECASE):
                          found_header = True
                          continue
                      if not found_header: continue

                      # Skip footer noise lines
                      ll = ltx.lower()
                      if any(ns in ll for ns in NOISE_SUBSTRINGS): continue
                      if len(re.sub(r'[^a-zA-Z]', '', ltx)) < 3: continue

                      # ── THE FIX: PILL_GAP = 80, NOT 100*scale ──────────────
                      # At 3x scale: between-pill gap ≈152px, within-pill ≈16-25px
                      PILL_GAP = 80

                      pill: list[str] = []
                      prev_right = None

                      for wp in lw:
                          gap = (wp['left'] - prev_right) if prev_right is not None else 0
                          if prev_right is not None and gap > PILL_GAP:
                              if pill:
                                  all_pills.append(' '.join(pill))
                                  pill = []
                          pill.append(wp['word'])
                          prev_right = wp['right']
                      if pill:
                          all_pills.append(' '.join(pill))

                  if not all_pills: continue

                  # Clean and deduplicate
                  seen: set[str] = set()
                  cleaned: list[str] = []
                  for p in all_pills:
                      p = clean_pill(p)
                      if is_noise(p): continue
                      k = p.lower()
                      if k not in seen:
                          seen.add(k)
                          cleaned.append(p)

                  if cleaned:
                      return cleaned

              return []

          # ── Per-file processing ────────────────────────────────────────────────

          def process_file(path: Path, frontend_dir: Path,
                           credly_map: dict, dry_run: bool) -> tuple[int, int]:
              data  = json.loads(path.read_text(encoding='utf-8'))
              creds = data.get('credentials', [])
              auto_dir = frontend_dir / 'certificates' / 'auto'
              updated = changed = 0

              for idx, c in enumerate(creds):
                  cid      = c.get('id', '')
                  ctype    = c.get('type', '')
                  old_tags = c.get('tags', [])
                  new_tags: list[str] = []

                  # ── Credly: live badge_template.skills ──────────────────────
                  if ctype == 'credly':
                      badge_id = c.get('credlyBadgeId', '')
                      print(f'  [credly] {cid} — {c.get("title","")[:55]}')
                      skills = credly_map.get(badge_id, [])
                      if skills:
                          new_tags = skills
                          print(f'    ✓ {len(new_tags)} skills from Credly')
                      else:
                          new_tags = [t for t in old_tags
                                      if not is_noise(t) and len(t) >= 3]
                          print(f'    ⚠ not in profile — keeping {len(new_tags)} existing')

                  # ── Cert image: OCR ─────────────────────────────────────────
                  else:
                      img_file = None
                      for ext in ['jpg','jpeg','png','webp']:
                          cand = auto_dir / f'{cid}.{ext}'
                          if cand.exists(): img_file = cand; break

                      if not img_file:
                          img_f = c.get('image') or c.get('pdf') or ''
                          if img_f and not img_f.endswith('.pdf'):
                              loc = frontend_dir / img_f.lstrip('/')
                              if loc.exists(): img_file = loc

                      print(f'  [cert]   {cid} — {c.get("title","")[:55]}')

                      if img_file:
                          result = ocr_pills(img_file)
                          if result:
                              new_tags = result
                              print(f'    ✓ OCR → {new_tags}')
                          else:
                              new_tags = [t for t in old_tags
                                          if not is_noise(t) and len(t) >= 3]
                              print(f'    ⚠ OCR empty — keeping {len(new_tags)} existing')
                      else:
                          new_tags = [t for t in old_tags
                                      if not is_noise(t) and len(t) >= 3]
                          print(f'    ⚠ no image — keeping {len(new_tags)} existing')

                  # Deduplicate
                  seen: set[str] = set()
                  deduped: list[str] = []
                  for t in new_tags:
                      k = t.lower()
                      if k not in seen: seen.add(k); deduped.append(t)
                  new_tags = deduped

                  if new_tags != old_tags:
                      if not dry_run:
                          creds[idx]['tags'] = new_tags
                      changed += 1
                  updated += 1

              if changed > 0 and not dry_run:
                  data['credentials'] = creds
                  path.write_text(json.dumps(data, indent=2, ensure_ascii=False),
                                  encoding='utf-8')
                  print(f'\n  ✅  Saved {path.name}  ({changed} updated)\n')

              return changed, updated

          # ── CLI ───────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument('--dir',             default='.')
          parser.add_argument('--dry-run',         action='store_true')
          parser.add_argument('--file',            type=int, choices=[1,2,3,4], default=None)
          parser.add_argument('--credly-username', default='mohamedaasiq07')
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1,2,3,4]

          credly_map = fetch_credly(args.credly_username)

          total_changed = total_processed = 0
          for n in nums:
              p = frontend / f'data_creds_{n}.json'
              if not p.exists(): continue
              print(f'\n{"="*60}\n  data_creds_{n}.json\n{"="*60}')
              c, u = process_file(p, frontend, credly_map, args.dry_run)
              total_changed   += c
              total_processed += u

          print(f'\n{"="*60}')
          print(f'  Done.  Updated: {total_changed} / {total_processed}')
          if args.dry_run: print('  (dry-run — nothing written)')
          print(f'{"="*60}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as f:
                  f.write('## Skill Sync v5\n')
                  f.write(f'- Credly profile: `{args.credly_username}`\n')
                  f.write(f'- Updated: {total_changed}/{total_processed} credentials\n')
                  f.write('- Root cause fixed: PILL_GAP was 100×scale=300 (too high)\n')
                  f.write('- Fix: PILL_GAP=80 correctly splits at 152px between-pill gaps\n')
          PYEOF

      - name: Sync skills
        run: |
          USERNAME="${{ inputs.credly_username }}"
          [ -z "$USERNAME" ] && USERNAME="mohamedaasiq07"
          ARGS="--dir frontend --credly-username $USERNAME"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}" ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python sync_skills.py $ARGS"
          python sync_skills.py $ARGS

      - name: Commit updated tags
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync skills — fix OCR pill split + live Credly fetch"
            git push
            echo "Pushed."
          fi
