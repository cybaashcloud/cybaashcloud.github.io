# ═══════════════════════════════════════════════════════════════════════════
# DEPLOY — Build admin panel + assemble _site + publish to GitHub Pages
# Updated: all files included — intel.html, patch CSS, military JS, meta JSON
# ═══════════════════════════════════════════════════════════════════════════
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/sync.yml'
      - 'scripts/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build _site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install admin dependencies
        working-directory: frontend/admin
        run: npm ci --no-audit --no-fund

      - name: Build admin panel
        working-directory: frontend/admin
        run: npm run build
        env:
          VITE_BASE_URL: /admin/

      - name: Verify admin build
        run: |
          test -d frontend/admin/dist            || { echo "ERROR: dist/ missing";       exit 1; }
          test -f frontend/admin/dist/index.html || { echo "ERROR: dist/index.html";     exit 1; }
          echo "Admin build OK: $(find frontend/admin/dist -type f | wc -l) files"

      - name: Assemble _site
        run: |
          set -euo pipefail
          mkdir -p _site/portfolio _site/admin _site/icons _site/ai

          # ── Core HTML pages ──────────────────────────────────────────
          cp frontend/index.html      _site/index.html
          cp frontend/recruiter.html  _site/recruiter.html
          cp frontend/dashboard.html  _site/dashboard.html
          cp frontend/offline.html    _site/offline.html

          # ── AI chatbot page ──────────────────────────────────────────
          cp -r frontend/ai/. _site/ai/

          # ── JavaScript files ─────────────────────────────────────────
          for f in \
            cybaash-ai.js \
            cybaash-ai_script.js \
            cybaash_chatbot.js \
            script.js \
            github.js \
            saas-integration.js \
            mobile.js \
            mobile-features.js \
            mobile-nav.js \
            ai-script.js \
            dashboard-military-additions.js \
            soc-tracker-v2.js; do
            [ -f "frontend/$f" ] && cp "frontend/$f" "_site/$f" && echo "OK $f" || echo "SKIP $f"
          done

          # ── CSS files ────────────────────────────────────────────────
          for f in \
            cybaash-ai.css \
            style.css \
            mobile.css \
            dashboard-patch.css \
            offline-patch.css \
            recruiter-patch.css; do
            [ -f "frontend/$f" ] && cp "frontend/$f" "_site/$f" && echo "OK $f" || echo "SKIP $f"
          done

          # ── SOC Security Dashboard (isolated — no tracker injected) ──
          cp frontend/admin/security.html                _site/admin/security.html
          cp frontend/admin/security.js                  _site/admin/security.js
          cp frontend/admin/security.css                 _site/admin/security.css
          cp frontend/admin/security-military-additions.js _site/admin/security-military-additions.js
          echo "OK admin/security.{html,js,css} + military additions"

          # ── Intel Panel ───────────────────────────────────────────────
          cp frontend/admin/intel.html _site/admin/intel.html
          echo "OK admin/intel.html"

          # ── Portfolio images ──────────────────────────────────────────
          for f in avatar.png li-logo.jpg project_eatpqa2f.png; do
            [ -f "frontend/$f" ] && cp "frontend/$f" "_site/portfolio/$f" && \
              cp "frontend/$f" "_site/$f" && echo "OK $f" || echo "SKIP $f"
          done

          # ── Data / JSON files ─────────────────────────────────────────
          for f in \
            data_main.json \
            data_meta.json \
            data_ai_config.json \
            data_creds_1.json \
            data_creds_2.json \
            data_creds_3.json \
            data_creds_4.json \
            data_creds_5.json; do
            if [ -f "frontend/$f" ]; then
              cp "frontend/$f" "_site/portfolio/$f"
              cp "frontend/$f" "_site/$f"
              echo "OK $f"
            else
              echo "SKIP $f"
            fi
          done

          # ── AI cache ──────────────────────────────────────────────────
          [ -f frontend/data_ai_cache.json ] && \
            cp frontend/data_ai_cache.json _site/data_ai_cache.json && \
            echo "OK data_ai_cache.json" || echo "SKIP data_ai_cache.json"

          # ── Admin React panel (built by Vite) ─────────────────────────
          cp -r frontend/admin/dist/. _site/admin/
          # Re-copy SOC + Intel files after dist (dist may overwrite them)
          cp frontend/admin/security.html                  _site/admin/security.html
          cp frontend/admin/security.js                    _site/admin/security.js
          cp frontend/admin/security.css                   _site/admin/security.css
          cp frontend/admin/security-military-additions.js _site/admin/security-military-additions.js
          cp frontend/admin/intel.html                     _site/admin/intel.html
          echo "OK SOC + Intel files re-applied after admin dist copy"

          # ── Certificates (auto + aws + manual) ───────────────────────
          if [ -d frontend/certificates ]; then
            mkdir -p _site/certificates
            cp -r frontend/certificates/. _site/certificates/
            echo "OK certificates/ ($(find frontend/certificates -type f | wc -l) files)"
          fi

          # ── Cert logos ────────────────────────────────────────────────
          if [ -d frontend/cert_logos ]; then
            mkdir -p _site/cert_logos
            cp -r frontend/cert_logos/. _site/cert_logos/
            echo "OK cert_logos/ ($(find frontend/cert_logos -type f | wc -l) files)"
          fi

          # ── PWA manifest + service worker ─────────────────────────────
          cp frontend/manifest.json _site/manifest.json
          cp frontend/sw.js         _site/sw.js
          [ -f frontend/_headers ] && cp frontend/_headers _site/_headers && echo "OK _headers"

          # ── Icons (all sizes + favicon) ───────────────────────────────
          find frontend/icons \( -name '*.png' -o -name '*.ico' \) | \
            while read -r f; do cp "$f" "_site/icons/$(basename "$f")"; done
          echo "OK icons/ ($(find frontend/icons -type f | wc -l) files)"

          touch _site/.nojekyll

          # ── Validate critical files ───────────────────────────────────
          echo "=== Validating _site ==="
          for f in \
            _site/index.html \
            _site/recruiter.html \
            _site/dashboard.html \
            _site/offline.html \
            _site/admin/index.html \
            _site/admin/security.html \
            _site/admin/security.js \
            _site/admin/security.css \
            _site/admin/security-military-additions.js \
            _site/admin/intel.html \
            _site/soc-tracker-v2.js \
            _site/portfolio/data_main.json \
            _site/data_main.json \
            _site/cybaash-ai.js \
            _site/script.js \
            _site/style.css \
            _site/mobile.css \
            _site/sw.js \
            _site/manifest.json; do
            test -f "$f" && echo "✓ $f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "Total files: $(find _site -type f | wc -l)"

      - name: Sanitize AI config
        run: python3 scripts/deploy_ai_config.py

      # ── SW version stamp ──────────────────────────────────────────────
      - name: Stamp SW version with content hash
        run: |
          python3 - << 'PYEOF'
          import hashlib, re, sys
          from pathlib import Path

          shell_files = [
            '_site/index.html', '_site/recruiter.html', '_site/dashboard.html',
            '_site/style.css',  '_site/mobile.css',     '_site/script.js',
            '_site/github.js',  '_site/cybaash-ai.js',  '_site/cybaash-ai.css',
            '_site/cybaash_chatbot.js', '_site/ai/index.html',
            '_site/ai/cybaash-ai_script.js', '_site/ai/style.css',
            '_site/soc-tracker-v2.js',
            '_site/admin/security.html',
            '_site/admin/security.js',
            '_site/admin/intel.html',
            '_site/admin/security-military-additions.js',
          ]

          h = hashlib.sha256()
          for f in shell_files:
              p = Path(f)
              if p.exists():
                  h.update(p.read_bytes())

          content_hash = h.hexdigest()[:8]
          version      = f'cybaash-v4-{content_hash}'

          sw_path = Path('_site/sw.js')
          sw_text = sw_path.read_text()
          new_text, count = re.subn(
              r"(const VERSION\s*=\s*')[^']*(')",
              rf"\g<1>{version}\g<2>",
              sw_text
          )
          if count == 0:
              print("ERROR: VERSION constant not found in sw.js")
              sys.exit(1)

          sw_path.write_text(new_text)
          print(f"SW VERSION stamped: {version}")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Write build summary
        run: |
          TOTAL=$(find _site -type f | wc -l)
          CERTS=$(find _site/certificates -type f 2>/dev/null | wc -l || echo 0)
          ICONS=$(find _site/icons -type f 2>/dev/null | wc -l || echo 0)
          echo "## Deploy Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Files assembled:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Certificate files:** $CERTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Icons:** $ICONS" >> $GITHUB_STEP_SUMMARY
          echo "- **SOC Dashboard:** \`/admin/security.html\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Intel Panel:** \`/admin/intel.html\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SOC Tracker:** \`/soc-tracker-v2.js\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
