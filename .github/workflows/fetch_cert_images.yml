name: Fetch Missing Cert Images

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Only process one file (leave blank for all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
      dry_run:
        description: 'Dry run — list creds without fetching'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 0'

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf pillow

      - name: Write fetch script
        run: |
          cat > fetch_cert_images.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          fetch_cert_images.py  v5
          ════════════════════════
          No Gemini, no API keys needed.

          ┌──────────────────────────────┬─────────────────────────────────────────┐
          │ Issuer contains              │ Strategy                                │
          ├──────────────────────────────┼─────────────────────────────────────────┤
          │ "Amazon Web Services"        │ PyMuPDF extracts PDF text →             │
          │                              │ unique-word match against cert titles   │
          ├──────────────────────────────┼─────────────────────────────────────────┤
          │ "Cisco" (type=certificate)   │ Static CISCO_PDF_MAP (filename→id)      │
          ├──────────────────────────────┼─────────────────────────────────────────┤
          │ Everything else              │ og:image scrape from URL                │
          └──────────────────────────────┴─────────────────────────────────────────┘

          Why unique-word matching works for AWS:
            Every cert title has at least one word that appears in none of the
            other cert titles: "cloudtrail", "guardduty", "cspm", "lake", "quest",
            "practitioner", "alerting", "builders", "workshop", "detection" etc.
            PyMuPDF (fitz) decompresses the PDF text streams and returns all of
            them.  We simply check which of a cert's unique words appear in the
            extracted PDF text — the correct PDF will always score 1+, wrong ones 0.
          """

          import argparse, json, os, re, time
          from collections import Counter
          from pathlib import Path
          from urllib.parse import urlparse

          import requests
          from bs4 import BeautifulSoup
          import fitz          # PyMuPDF
          from PIL import Image

          # ── Config ────────────────────────────────────────────────────────────────

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (X11; Linux x86_64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/124.0.0.0 Safari/537.36"
              ),
              "Accept-Language": "en-US,en;q=0.9",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Referer": "https://www.linkedin.com/",
          }
          IMG_HEADERS = {
              "User-Agent": HEADERS["User-Agent"],
              "Referer": "https://www.linkedin.com/",
              "Accept": "image/avif,image/webp,image/apng,image/*,*/*;q=0.8",
          }
          DELAY_PAGE, DELAY_IMG, TIMEOUT = 0.9, 0.4, 15
          AUTO_DIR_REL = "certificates/auto"

          # Cisco: PDF filename → cert ID  (add new lines when new Cisco PDFs arrive)
          CISCO_PDF_MAP = {
              "cisco_packet_tracer.pdf": "pro011",
          }

          # Common words shared across many cert titles — excluded from unique-word logic
          STOP = {
              "and","the","a","an","of","for","to","in","with","by","is","are",
              "on","at","from","or","its","this","that","includes","labs",
              "getting","started","plan","aws","amazon","security","cloud","best",
          }

          # ── Issuer helpers ─────────────────────────────────────────────────────────

          def is_aws(issuer: str) -> bool:
              return "amazon web services" in issuer.lower()

          def is_cisco_cert(issuer: str, ctype: str) -> bool:
              return "cisco" in issuer.lower() and ctype != "credly"

          # ── og:image scraper (LinkedIn Learning, etc.) ─────────────────────────────

          def fetch_og(page_url: str):
              try:
                  r = requests.get(page_url, headers=HEADERS, timeout=TIMEOUT,
                                   allow_redirects=True)
                  if r.status_code != 200:
                      print(f"    page HTTP {r.status_code}")
                      return None
                  soup = BeautifulSoup(r.text, "html.parser")
                  for prop in ["og:image", "og:image:secure_url"]:
                      tag = soup.find("meta", property=prop)
                      if tag and tag.get("content"):
                          return tag["content"].strip()
                  tag = soup.find("meta", attrs={"name": "twitter:image"})
                  if tag and tag.get("content"):
                      return tag["content"].strip()
                  for img in soup.find_all("img"):
                      src = img.get("src", "")
                      alt = img.get("alt", "").lower()
                      if ("certificate" in alt or "cert" in src.lower()) and src.startswith("http"):
                          return src.strip()
              except Exception as e:
                  print(f"    fetch error: {e}")
              return None

          def download_image(img_url: str, save_dir: Path, cred_id: str):
              try:
                  r = requests.get(img_url, headers=IMG_HEADERS, timeout=TIMEOUT, stream=True)
                  if r.status_code != 200:
                      print(f"    image HTTP {r.status_code}")
                      return None
                  ct  = r.headers.get("Content-Type", "image/jpeg")
                  ext = "png" if "png" in ct else "webp" if "webp" in ct else "jpg"
                  up  = urlparse(img_url).path.lower()
                  for e in ["png", "webp", "gif"]:
                      if up.endswith(f".{e}"):
                          ext = e; break
                  fname = f"{cred_id}.{ext}"
                  dest  = save_dir / fname
                  save_dir.mkdir(parents=True, exist_ok=True)
                  with open(dest, "wb") as fh:
                      for chunk in r.iter_content(8192): fh.write(chunk)
                  kb = dest.stat().st_size / 1024
                  print(f"    saved {fname} ({kb:.0f} KB)")
                  return fname
              except Exception as e:
                  print(f"    download error: {e}")
              return None

          # ── PDF → JPEG renderer ────────────────────────────────────────────────────

          def pdf_to_jpeg(pdf_path: Path, out_path: Path, dpi: int = 150) -> bool:
              try:
                  doc  = fitz.open(str(pdf_path))
                  page = doc[0]
                  mat  = fitz.Matrix(dpi / 72, dpi / 72)
                  pix  = page.get_pixmap(matrix=mat, colorspace=fitz.csRGB)
                  img  = Image.frombytes("RGB", [pix.width, pix.height], pix.samples)
                  out_path.parent.mkdir(parents=True, exist_ok=True)
                  img.save(str(out_path), "JPEG", quality=88, optimize=True)
                  kb = out_path.stat().st_size / 1024
                  print(f"    rendered {pdf_path.name} → {out_path.name} ({kb:.0f} KB)")
                  return True
              except Exception as e:
                  print(f"    PDF render error ({pdf_path.name}): {e}")
                  return False

          # ── AWS: unique-word matching ──────────────────────────────────────────────

          def pdf_words(pdf_path: Path) -> set:
              """Extract all words from all pages of a PDF via PyMuPDF."""
              try:
                  doc = fitz.open(str(pdf_path))
                  text = " ".join(page.get_text("text") for page in doc)
                  return set(re.findall(r"[a-z0-9]+", text.lower()))
              except Exception as e:
                  print(f"    fitz error ({pdf_path.name}): {e}")
                  return set()

          def title_words(title: str) -> set:
              """Tokenise a cert title, strip stop words."""
              return set(re.findall(r"[a-z0-9]+", title.lower())) - STOP

          def build_unique_word_index(certs: list) -> dict:
              """
              For each cert, find words in its title that appear in NO other cert
              title.  These are the fingerprint words used for PDF matching.
              Returns {cert_id: set_of_unique_words}.
              """
              # Count how many cert titles each word appears in
              freq = Counter()
              for c in certs:
                  freq.update(title_words(c.get("title", "")))
              # Keep only words that are unique to exactly one cert
              return {
                  c["id"]: {w for w in title_words(c.get("title", "")) if freq[w] == 1}
                  for c in certs
              }

          def match_aws_pdfs(pdf_dir: Path, aws_certs: list) -> dict:
              """
              Match each PDF in pdf_dir to a cert by unique-word fingerprint.
              Returns {cert_id: pdf_path}.
              """
              pdfs = sorted(pdf_dir.glob("*.pdf"))
              if not pdfs:
                  print(f"  ⚠ No PDFs in {pdf_dir}")
                  return {}

              print(f"\n  Matching {len(pdfs)} AWS PDF(s) → {len(aws_certs)} cert(s)")

              # Build word sets for each PDF (fitz decompresses the streams)
              pdf_word_sets = {p: pdf_words(p) for p in pdfs}

              # Build unique-word fingerprints for each cert
              unique_index = build_unique_word_index(aws_certs)

              mapping   = {}
              used_pdfs = set()

              for c in sorted(aws_certs, key=lambda x: x["id"]):
                  cid       = c["id"]
                  ctitle    = c.get("title", "")
                  fingerprint = unique_index.get(cid, set())

                  if not fingerprint:
                      print(f"    ✗ {cid} — no unique words in title: '{ctitle}'")
                      continue

                  # Score = number of fingerprint words found in the PDF text
                  best_score, best_pdf = 0, None
                  for p in pdfs:
                      if p in used_pdfs:
                          continue
                      score = len(fingerprint & pdf_word_sets[p])
                      if score > best_score:
                          best_score = score
                          best_pdf   = p

                  if best_pdf and best_score > 0:
                      mapping[cid] = best_pdf
                      used_pdfs.add(best_pdf)
                      print(f"    ✓ {cid} ← {best_pdf.name}")
                      print(f"      title: '{ctitle}'")
                      print(f"      fingerprint hits: {fingerprint & pdf_word_sets[best_pdf]}")
                  else:
                      print(f"    ✗ {cid} — no fingerprint words found in any PDF")
                      print(f"      fingerprint: {fingerprint}")

              return mapping

          # ── Per-file processor ─────────────────────────────────────────────────────

          def process_file(path: Path, frontend_dir: Path, dry_run: bool):
              data  = json.loads(path.read_text(encoding="utf-8"))
              creds = data.get("credentials", [])
              auto  = frontend_dir / AUTO_DIR_REL

              aws_pending = [
                  c for c in creds
                  if not (c.get("image") or "")
                  and c.get("type") != "credly"
                  and is_aws(c.get("issuer", ""))
              ]
              aws_map = {}
              if aws_pending:
                  aws_map = match_aws_pdfs(
                      frontend_dir / "certificates" / "aws",
                      aws_pending,
                  )

              fetched = skipped = 0
              changed = False

              for idx, c in enumerate(creds):
                  img    = c.get("image") or ""
                  url    = c.get("url")   or ""
                  ctype  = c.get("type",  "")
                  cid    = c["id"]
                  issuer = c.get("issuer", "")

                  if img or ctype == "credly":
                      skipped += 1
                      continue

                  print(f"\n[{cid}] {c.get('title','')[:65]}")
                  print(f"  issuer: {issuer}")

                  if dry_run:
                      if is_aws(issuer):
                          pdf = aws_map.get(cid)
                          print(f"  → AWS PDF: {pdf.name if pdf else 'NO MATCH'}")
                      elif is_cisco_cert(issuer, ctype):
                          mapped = next((f for f,i in CISCO_PDF_MAP.items() if i==cid), None)
                          print(f"  → Cisco PDF: {mapped or 'NOT IN CISCO_PDF_MAP'}")
                      else:
                          print(f"  → og:image scrape: {url or '(no URL)'}")
                      continue

                  saved_fname  = None
                  pdf_rel_path = None

                  # ── AWS ──────────────────────────────────────────────────────────
                  if is_aws(issuer):
                      pdf_path = aws_map.get(cid)
                      if not pdf_path:
                          print(f"  ✗ no PDF match for {cid} — skipping")
                          skipped += 1
                          continue
                      out_path = auto / f"{cid}.jpg"
                      if pdf_to_jpeg(pdf_path, out_path):
                          saved_fname  = f"{cid}.jpg"
                          pdf_rel_path = f"/certificates/aws/{pdf_path.name}"
                      else:
                          skipped += 1
                          continue

                  # ── Cisco ────────────────────────────────────────────────────────
                  elif is_cisco_cert(issuer, ctype):
                      cisco_dir = frontend_dir / "certificates"
                      pdf_fname = next((f for f,i in CISCO_PDF_MAP.items() if i==cid), None)
                      if not pdf_fname:
                          print(f"  ⚠ {cid} not in CISCO_PDF_MAP — add mapping and re-run")
                          skipped += 1
                          continue
                      pdf_path = cisco_dir / pdf_fname
                      if not pdf_path.exists():
                          print(f"  ✗ PDF not found: {pdf_path}")
                          skipped += 1
                          continue
                      out_path = auto / f"{cid}.jpg"
                      if pdf_to_jpeg(pdf_path, out_path):
                          saved_fname  = f"{cid}.jpg"
                          pdf_rel_path = f"/certificates/{pdf_fname}"
                      else:
                          skipped += 1
                          continue

                  # ── All others: og:image scrape ───────────────────────────────────
                  else:
                      if not url:
                          print(f"  ✗ no URL — skipping")
                          skipped += 1
                          continue
                      print(f"  url: {url}")
                      og = fetch_og(url)
                      time.sleep(DELAY_PAGE)
                      if not og:
                          print(f"  ✗ no og:image")
                          skipped += 1
                          continue
                      print(f"  og: {og[:80]}")
                      saved_fname = download_image(og, auto, cid)
                      time.sleep(DELAY_IMG)
                      if not saved_fname:
                          skipped += 1
                          continue

                  creds[idx]["image"] = f"/{AUTO_DIR_REL}/{saved_fname}"
                  if pdf_rel_path:
                      creds[idx]["pdfUrl"] = pdf_rel_path
                      print(f"  ✓ pdfUrl → {pdf_rel_path}")

                  fetched += 1
                  changed  = True

              if changed and not dry_run:
                  data["credentials"] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding="utf-8")
                  print(f"\nSaved {path.name} (+{fetched} images)")

              return fetched, skipped

          # ── Main ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument("--dir",     default=".")
          parser.add_argument("--dry-run", action="store_true")
          parser.add_argument("--file",    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1,2,3,4]
          tf = ts  = 0
          for n in nums:
              p = frontend / f"data_creds_{n}.json"
              if not p.exists(): continue
              print(f"\n{'='*60}\n  data_creds_{n}.json\n{'='*60}")
              f, s = process_file(p, frontend, args.dry_run)
              tf += f; ts += s

          print(f"\n{'='*60}")
          print(f"  Done.  Rendered/fetched={tf}  Skipped={ts}")
          print(f"{'='*60}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write("## Cert Image Fetch v5\n")
                  fh.write(f"- **Rendered / fetched:** {tf}\n")
                  fh.write(f"- **Skipped:** {ts}\n")
          PYEOF

      - name: Fetch missing cert images
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}"  ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python fetch_cert_images.py $ARGS"
          python fetch_cert_images.py $ARGS

      - name: Commit images and updated JSON
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/certificates/auto/ frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes — all images already present."
          else
            COUNT=$(git diff --cached --name-only | grep -c "certificates/auto" || true)
            git commit -m "feat: render ${COUNT} PDF cert images [skip ci]"
            git push
            echo "Pushed ${COUNT} new cert images."
          fi
