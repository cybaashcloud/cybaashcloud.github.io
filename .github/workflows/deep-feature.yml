        run: |
          pass_icon() { [ "$1" = "success" ] && echo "✅ Pass" || [ "$1" = "skipped" ] && echo "⏭ Skip" || echo "❌ Fail"; }
          echo "## 🔬 Deep Feature Check — \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feature Area | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️  Worker endpoints | ${{ steps.worker_endpoints.outcome == 'success' && '✅ Pass' || steps.worker_endpoints.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Worker security | ${{ steps.worker_security.outcome == 'success' && '✅ Pass' || steps.worker_security.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡  SOC Dashboard + Terminal | ${{ steps.soc_dashboard.outcome == 'success' && '✅ Pass' || steps.soc_dashboard.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Intel page | ${{ steps.intel_page.outcome == 'success' && '✅ Pass' || steps.intel_page.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️  Tools page (50 tools) | ${{ steps.tools_page.outcome == 'success' && '✅ Pass' || steps.tools_page.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 AI assistant + chatbot | ${{ steps.ai_check.outcome == 'success' && '✅ Pass' || steps.ai_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎮 Simulation / cyber range | ${{ steps.simulation_check.outcome == 'success' && '✅ Pass' || steps.simulation_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Main portfolio | ${{ steps.portfolio_check.outcome == 'success' && '✅ Pass' || steps.portfolio_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📜 Recruiter + credentials | ${{ steps.recruiter_check.outcome == 'success' && '✅ Pass' || steps.recruiter_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 SOC Tracker fingerprinting | ${{ steps.tracker_check.outcome == 'success' && '✅ Pass' || steps.tracker_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 PWA / Service Worker | ${{ steps.pwa_check.outcome == 'success' && '✅ Pass' || steps.pwa_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐙 GitHub API integration | ${{ steps.github_api.outcome == 'success' && '✅ Pass' || steps.github_api.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
