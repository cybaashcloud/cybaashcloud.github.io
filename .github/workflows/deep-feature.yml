          echo "| 🔎 Deployed pages (byte check) | ${{ steps.deployed_pages.outcome == 'success' && '✅ Pass' || steps.deployed_pages.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
