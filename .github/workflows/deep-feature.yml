              '/soc-tracker-v2.js','/sw.js','/ai/cybaash-ai_script.js',
              '/admin/security.css','/admin/security.js',
              '/admin/security-military-additions.js',
              '/icons/icon-192x192.png','/icons/icon-512x512.png',
          ]
          for path in assets:
              try:
                  r = requests.get(BASE+path, timeout=10,
                      headers={'User-Agent':'CYBAASH-HealthCheck/1.0'})
                  kb = len(r.content)/1024
                  if r.status_code != 200 or kb < 0.1:
                      print(f'❌ {path}: HTTP {r.status_code}  {kb:.1f}KB')
                      errors += 1
                  else:
                      print(f'✓  {path}: {kb:.0f}KB')
              except Exception as e:
                  print(f'⚠  {path}: {e}')

          if errors: sys.exit(1)
          else: print('\n✅ All static assets load correctly')
