          echo "| 📲 Mobile features | ${{ steps.mobile_check.outcome == 'success' && '✅ Pass' || steps.mobile_check.outcome == 'skipped' && '⏭ Skip' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
