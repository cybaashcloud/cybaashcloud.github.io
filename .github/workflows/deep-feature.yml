      # ══════════════════════════════════════════════════════════════════════
      # 16. SECURITY LOGIC — byte-level auth, hash, secrets scan
      # ══════════════════════════════════════════════════════════════════════
      - name: Security logic byte check
        id: security_logic
        run: |
          python3 - << 'PYEOF'
          import re, sys, hashlib, os
          from pathlib import Path

          errors = 0
          sec_js = Path('frontend/admin/security.js').read_text()

          print('── Auth constants ────────────────────────────────────')
          DEFAULT_PW    = 'cybaash-soc-admin'
          EXPECTED_HASH = 'df132f130508df6a9d31b7fe7dc77a058296bb8d12c8202fca2c765dd0c7e52b'
          computed = hashlib.sha256(DEFAULT_PW.encode()).hexdigest()
          ok = computed == EXPECTED_HASH
          print(f'{"✓ " if ok else "❌"}  Default password hash: {EXPECTED_HASH[:16]}…')
          if not ok: errors += 1

          ok2 = "crypto.subtle.digest('SHA-256'" in sec_js
          print(f'{"✓ " if ok2 else "❌"}  SHA-256 via SubtleCrypto')
          if not ok2: errors += 1

          m = re.search(r'LOGIN_MAX_ATTEMPTS\s*=\s*(\d+)', sec_js)
          if m: print(f'✓  LOGIN_MAX_ATTEMPTS: {m.group(1)}')

          m = re.search(r'LOGIN_LOCKOUT_MS\s*=\s*([\d_]+)', sec_js)
          if m: print(f'✓  Lockout: {int(m.group(1).replace("_",""))/60000:.0f} min')

          m = re.search(r'sessionTimeout\s*[=:]\s*(\d+)', sec_js)
          if m: print(f'✓  Session timeout: {m.group(1)} min')

          escape_n = len(re.findall(r'escapeHtml\(', sec_js))
          print(f'✓  escapeHtml() uses: {escape_n}')
          if escape_n < 5: print('⚠  Very few escapeHtml calls')

          print('\n── Secret scan (all source files) ───────────────────')
          found_secrets = False
          for root, dirs, files in os.walk('frontend'):
              dirs[:] = [d for d in dirs if d not in ['certificates','cert_logos','dist']]
              for fname in files:
                  if not fname.endswith(('.js','.html')): continue
                  c = open(os.path.join(root,fname), errors='replace').read()
                  for pat, label in [
                      (r'AIza[A-Za-z0-9_-]{35}',             'Google API key'),
                      (r'ghp_[A-Za-z0-9]{36}',               'GitHub PAT'),
                      (r'sk-[A-Za-z0-9]{48}',                'OpenAI key'),
                      (r'APPS_SCRIPT_URL\s*=\s*["\']https://', 'Apps Script URL'),
                      (r'SOC_API_KEY\s*=\s*["\'][^"\']{10,}', 'SOC API key literal'),
                  ]:
                      if re.search(pat, c):
                          print(f'❌ SECRET: {os.path.join(root,fname)} — {label}')
                          errors += 1
                          found_secrets = True
          if not found_secrets:
              print('✓  No plaintext secrets in source files')

          print('\n── Tools page script integrity ──────────────────────')
          tools = Path('frontend/admin/tools.html').read_text()
          scripts = re.findall(r'<script[^>]*>(.*?)</script>', tools, re.DOTALL)
          ok3 = len(scripts) == 1
          print(f'{"✓ " if ok3 else "❌"}  tools.html: {len(scripts)} script block(s) (expected 1)')
          if not ok3: errors += 1

          if errors: sys.exit(1)
          else: print('\n✅ Security logic checks passed')
          PYEOF

      # ══════════════════════════════════════════════════════════════════════
      # 17. MOBILE FEATURES
      # ══════════════════════════════════════════════════════════════════════
