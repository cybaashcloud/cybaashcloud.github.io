# ═══════════════════════════════════════════════════════════════════════════
# CREDLY BADGE SYNC — Auto-import new Credly badges into recruiter view
#
# What it does:
#   1. Reads all Credly badge IDs already stored in data_creds_*.json
#   2. Fetches the full badge list from the public Credly API for your username
#   3. For every NEW badge (not yet in the JSON files):
#      • Downloads the badge image → encodes as base64 credlyImageUrl
#      • Extracts title, issuer, date, verify URL
#      • Auto-generates skill tags from the badge title
#      • Appends a fully-formed credential object to data_creds_*.json
#        in the EXACT same format as every other Credly badge already there
#   4. Commits and pushes the updated JSON files
#   5. Triggers a full site deploy (sync.yml)
#
# The new badge will appear in:
#   Recruiter → Credentials → CREDLY BADGES  (with badge photo, title,
#   skill tags, verify URL, and a "View Badge" button)
#
# SETUP — one-time:
#   Go to your repo → Settings → Secrets and variables → Actions → New secret
#   Name:  CREDLY_USERNAME
#   Value: your Credly username  (the part after credly.com/users/)
#          e.g. if your profile is credly.com/users/mohamedaasiq → value is "mohamedaasiq"
#
# WHEN IT RUNS:
#   • Automatically every Monday at 03:00 UTC  (catches any badges earned last week)
#   • Manually via Actions → "Credly Badge Sync" → Run workflow
#   • You can also check "Force re-sync all badges" to re-download everything
# ═══════════════════════════════════════════════════════════════════════════

name: Credly Badge Sync

on:
  schedule:
    - cron: '0 3 * * 1'      # Every Monday 03:00 UTC

  workflow_dispatch:
    inputs:
      force_resync:
        description: 'Force re-sync all badges (re-download images, overwrite existing)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — fetch and print, but do not commit or deploy'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-badges:
    name: Sync Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: pip install requests

      # ── 3. Run sync script ─────────────────────────────────────────────
      - name: Sync Credly badges
        env:
          CREDLY_USERNAME: ${{ secrets.CREDLY_USERNAME }}
          FORCE_RESYNC:    ${{ inputs.force_resync || 'false' }}
        working-directory: .
        run: |
          python3 .github/scripts/sync_credly_badges.py

      # ── 4. Commit updated JSON files ───────────────────────────────────
      - name: Commit updated credential files
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/data_creds_*.json

          if git diff --cached --quiet; then
            echo "No new Credly badges found. Nothing to commit."
            echo "BADGES_ADDED=0" >> "$GITHUB_ENV"
          else
            # Count how many new credentials were added across all files
            ADDED=$(git diff --cached -- frontend/data_creds_*.json \
              | grep '^+' \
              | grep '"type": "credly"' \
              | wc -l | tr -d ' ')

            git commit -m "feat: sync ${ADDED} new Credly badge(s) from profile [skip ci]"
            git push
            echo "BADGES_ADDED=${ADDED}" >> "$GITHUB_ENV"
            echo "Pushed ${ADDED} new Credly badge(s)."
          fi

      # ── 5. Trigger full deploy if badges were added ────────────────────
      - name: Trigger site deploy
        if: ${{ !inputs.dry_run && env.BADGES_ADDED != '0' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              workflow_id:  'sync.yml',
              ref:          context.ref || 'main',
            });
            core.info('Deploy triggered via sync.yml');

      # ── 6. Step summary ───────────────────────────────────────────────
      - name: Write step summary
        if: always()
        run: |
          echo "## Credly Badge Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Credly username | \`${{ secrets.CREDLY_USERNAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Force re-sync | ${{ inputs.force_resync || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ inputs.dry_run || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Badges added | ${{ env.BADGES_ADDED || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
