name: Sync Credential Skills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show changes without saving)'
        required: false
        default: false
        type: boolean
      file:
        description: 'Only process one creds file (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
  schedule:
    - cron: '30 3 * * 0'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr --quiet
          pip install requests pillow pytesseract

      - name: Write sync script
        run: |
          cat > sync_skills.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          sync_skills.py  v8
          ══════════════════
          CREDLY
            URL: https://www.credly.com/users/mohamed-aasiq/badges.json
            Stores both earner_id and tmpl_id as keys so either matches.
            Tags = badge_template.skills only (no names, no titles).
            If profile 404 or private → keep existing tags unchanged.

          LINKEDIN / CERTIFICATE images
            OCR zone detection → pill gap split (PILL_GAP=80, not 100*scale).
            OCR found   → use OCR pills only.
            OCR empty   → keep existing tags unchanged (no fallback invented).
            No image    → keep existing tags unchanged.

          RULE: NEVER add title, issuer, platform, or any invented text as tags.
                Only real skill pills from OCR or real skills from Credly API.
          """

          import argparse, json, os, re, time
          from pathlib import Path
          import requests
          from PIL import Image, ImageEnhance
          import pytesseract

          CREDLY_USERNAME = 'mohamed-aasiq'   # ← FIXED (was mohamedaasiq07 — wrong, caused 404)

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 '
                            'Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://www.credly.com/',
          }
          TIMEOUT = 20
          DELAY   = 1.2

          # Words/phrases that must never appear as skill tags
          JUNK = {
              'credly', 'credly badges', 'acclaim', 'open badges', 'digital badges',
              'badges', 'web-enabled credentials', 'badge alliance',
              'mozilla open badge standards', 'mozilla open badges',
              'verified credentials', 'learning outcomes',
              'linkedin', 'linkedin learning', 'learning path',
              'shea hanson', 'head of learning content strategy',
          }

          def is_junk(tag: str) -> bool:
              if len(tag) < 3:
                  return True
              if not re.match(r'[A-Za-z.]', tag):
                  return True
              return tag.lower() in JUNK

          def fix_ocr(text: str) -> str:
              """Fix common OCR misreads."""
              text = re.sub(r'\bAl\b', 'AI', text)
              text = re.sub(r'\bMl\b', 'ML', text)
              text = re.sub(r'\bNET\b', '.NET', text)
              text = re.sub(r'\bloT\b', 'IoT', text)
              text = re.sub(r'\blaC\b', 'IaC', text)
              # Strip incomplete trailing open-paren e.g. "Python (Programming Language"
              if '(' in text and ')' not in text:
                  text = re.sub(r'\s*\([^)]*$', '', text)
              text = text.strip(' ()[]|~*.,\'"')
              return re.sub(r'\s+', ' ', text).strip()

          # ── Credly live fetch ──────────────────────────────────────────────────────

          def fetch_credly() -> dict:
              """
              Fetch all badges from public profile.
              Returns {id: [skill, ...]} keyed by BOTH earner_id AND tmpl_id.
              Empty dict if profile is private or unreachable.
              """
              result = {}
              page   = 1
              print(f'\n  Fetching Credly: {CREDLY_USERNAME}')

              while True:
                  url = (f'https://www.credly.com/users/{CREDLY_USERNAME}/badges.json'
                         f'?page={page}&page_size=48')
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                  except Exception as e:
                      print(f'  ✗ Network error: {e}')
                      break

                  if r.status_code == 404:
                      print(f'  ✗ 404 — profile not found or private')
                      print(f'    → Ensure credly.com Settings → Privacy → Public')
                      break

                  if r.status_code != 200:
                      print(f'  ✗ HTTP {r.status_code}')
                      break

                  try:
                      payload = r.json()
                  except Exception as e:
                      print(f'  ✗ JSON error: {e}')
                      break

                  badges = payload.get('data', [])
                  if not badges:
                      break

                  for b in badges:
                      earner_id = b.get('id', '')
                      tmpl      = b.get('badge_template', {})
                      tmpl_id   = tmpl.get('id', '')
                      skills    = [
                          s['name'].strip()
                          for s in tmpl.get('skills', [])
                          if s.get('name', '').strip()
                          and not is_junk(s['name'].strip())
                      ]
                      if earner_id: result[earner_id] = skills
                      if tmpl_id:   result[tmpl_id]   = skills

                  meta  = payload.get('metadata', {})
                  total = meta.get('total_count', 0)
                  per   = meta.get('per', 48)
                  print(f'    page {page}: {len(badges)} badges  (total={total})')
                  if page * per >= total:
                      break
                  page += 1
                  time.sleep(DELAY)

              n = len(result) // 2 if result else 0
              print(f'  Done: {n} badges\n')
              return result

          # ── OCR pill extraction ────────────────────────────────────────────────────

          def ocr_pills(img_path: Path) -> list:
              try:
                  img = Image.open(img_path).convert('RGB')
              except Exception as e:
                  print(f'    cannot open image: {e}')
                  return []

              w, h = img.size
              # Try two zones for 'Top skills covered' section
              for zone in [
                  (0, int(h * .50), w, int(h * .72)),
                  (0, int(h * .44), w, int(h * .68)),
              ]:
                  pills = _ocr_zone(img, zone)
                  if pills:
                      return pills
              return []

          def _ocr_zone(img, box):
              crop  = img.crop(box)
              scale = 3
              crop  = crop.resize(
                  (crop.width * scale, crop.height * scale), Image.LANCZOS)
              crop  = ImageEnhance.Contrast(crop).enhance(2.5).convert('L')

              data  = pytesseract.image_to_data(
                  crop, config='--psm 6',
                  output_type=pytesseract.Output.DICT)

              words = []
              for i, word in enumerate(data['text']):
                  if not word.strip() or int(data['conf'][i]) < 20:
                      continue
                  words.append({
                      'word':  word,
                      'left':  data['left'][i],
                      'top':   data['top'][i],
                      'right': data['left'][i] + data['width'][i],
                  })
              if not words:
                  return []

              # Group into lines by vertical proximity
              LINE_TOL = 75
              lines = {}
              for wp in words:
                  key = round(wp['top'] / LINE_TOL) * LINE_TOL
                  lines.setdefault(key, []).append(wp)

              found_header = False
              all_pills    = []

              for key in sorted(lines):
                  lw  = sorted(lines[key], key=lambda x: x['left'])
                  ltx = ' '.join(w['word'] for w in lw)

                  # Find 'Top skills covered' header
                  if re.search(r'top\s+skills?\s+covered', ltx, re.IGNORECASE):
                      found_header = True
                      continue
                  if not found_header:
                      continue

                  # Skip noise lines
                  ll = ltx.lower()
                  if any(n in ll for n in [
                      'shea hanson', 'certificate id', 'learning content',
                      'completed by', 'utc +', 'utc -', 'utc «',
                      'oours', "et'", 'hte,',
                  ]):
                      continue
                  if len(re.sub(r'[^a-zA-Z]', '', ltx)) < 3:
                      continue

                  # ── PILL_GAP = 80 ──────────────────────────────────────────────
                  # At 3× scale: between-pill gap ≈152px > 80 → splits  ✓
                  #              within-pill gap  ≈16-25px < 80 → joins  ✓
                  # (old bug: PILL_GAP = 100 * scale = 300 → never split)
                  PILL_GAP   = 80
                  pill       = []
                  prev_right = None

                  for wp in lw:
                      gap = (wp['left'] - prev_right) if prev_right is not None else 0
                      if prev_right is not None and gap > PILL_GAP:
                          if pill:
                              all_pills.append(' '.join(pill))
                              pill = []
                      pill.append(wp['word'])
                      prev_right = wp['right']
                  if pill:
                      all_pills.append(' '.join(pill))

              if not all_pills:
                  return []

              # Clean + deduplicate
              seen    = set()
              cleaned = []
              for p in all_pills:
                  p = fix_ocr(p)
                  if is_junk(p):
                      continue
                  k = p.lower()
                  if k not in seen:
                      seen.add(k)
                      cleaned.append(p)

              return cleaned

          # ── Per-file processing ────────────────────────────────────────────────────

          def process_file(path, frontend_dir, credly_map, dry_run):
              data    = json.loads(path.read_text(encoding='utf-8'))
              creds   = data.get('credentials', [])
              auto    = frontend_dir / 'certificates' / 'auto'
              changed = 0

              for idx, c in enumerate(creds):
                  cid      = c.get('id', '')
                  ctype    = c.get('type', '')
                  old_tags = list(c.get('tags') or [])
                  new_tags = old_tags  # default: unchanged

                  # ── CREDLY ─────────────────────────────────────────────────────
                  if ctype == 'credly':
                      badge_id = c.get('credlyBadgeId', '') or ''
                      print(f'  [credly] {cid} — {c.get("title","")[:55]}')

                      if credly_map:
                          skills = credly_map.get(badge_id, [])
                          if skills:
                              new_tags = skills
                              print(f'    ✓ {len(new_tags)} skills from Credly live')
                          else:
                              # badge_id not returned in profile — keep existing
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ badge not in profile — keeping {len(new_tags)} existing')
                      else:
                          # Profile 404 / private — keep existing
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ profile unavailable — keeping {len(new_tags)} existing')

                  # ── CERT / LINKEDIN: OCR only ───────────────────────────────────
                  else:
                      # Resolve local image path
                      img_file = None
                      for ext in ['jpg', 'jpeg', 'png', 'webp']:
                          cand = auto / f'{cid}.{ext}'
                          if cand.exists():
                              img_file = cand
                              break

                      # cert_logos folder for pro0xx
                      if not img_file:
                          logos = frontend_dir / 'cert_logos'
                          for ext in ['jpg', 'jpeg', 'png']:
                              cand = logos / f'{cid}_image.{ext}'
                              if cand.exists():
                                  img_file = cand
                                  break

                      print(f'  [cert]   {cid} — {c.get("title","")[:55]}')

                      if img_file:
                          ocr = ocr_pills(img_file)
                          if ocr:
                              new_tags = ocr
                              print(f'    ✓ OCR → {new_tags}')
                          else:
                              # OCR found nothing → keep existing, strip junk
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ OCR empty — keeping {len(new_tags)} existing')
                      else:
                          # No local image → keep existing, strip junk
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ no image — keeping {len(new_tags)} existing')

                  # Deduplicate preserving order
                  seen     = set()
                  deduped  = []
                  for t in new_tags:
                      k = t.lower()
                      if k not in seen:
                          seen.add(k)
                          deduped.append(t)
                  new_tags = deduped

                  if new_tags != old_tags:
                      if not dry_run:
                          creds[idx]['tags'] = new_tags
                      changed += 1

              if changed > 0 and not dry_run:
                  data['credentials'] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding='utf-8')
                  print(f'\n  ✅  Saved {path.name} ({changed} updated)\n')

              return changed, len(creds)

          # ── Main ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument('--dir',     default='.')
          parser.add_argument('--dry-run', action='store_true')
          parser.add_argument('--file',    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1, 2, 3, 4]

          credly_map = fetch_credly()

          total_changed = total_creds = 0
          for n in nums:
              p = frontend / f'data_creds_{n}.json'
              if not p.exists():
                  continue
              print(f'\n{"="*60}\n  data_creds_{n}.json\n{"="*60}')
              chg, cnt = process_file(p, frontend, credly_map, args.dry_run)
              total_changed += chg
              total_creds   += cnt

          print(f'\n{"="*60}')
          print(f'  Done.  Updated: {total_changed} / {total_creds}')
          if args.dry_run:
              print('  (dry-run — nothing written)')
          print(f'{"="*60}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as f:
                  f.write('## Skill Sync v8\n')
                  f.write(f'- Credly: `{CREDLY_USERNAME}`'
                          f' — {len(credly_map)//2} badges\n')
                  f.write(f'- Updated: {total_changed}/{total_creds}\n')
                  if args.dry_run:
                      f.write('- **DRY RUN — nothing written**\n')
          PYEOF

      - name: Sync skills
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}"  ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python sync_skills.py $ARGS"
          python sync_skills.py $ARGS

      - name: Commit updated tags
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync credential skills [skip ci]"
            git push
          fi
