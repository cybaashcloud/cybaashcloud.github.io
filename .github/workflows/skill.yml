name: Sync Credential Skills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show changes without saving)'
        required: false
        default: false
        type: boolean
      file:
        description: 'Only process one creds file (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
  schedule:
    - cron: '30 3 * * 0'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr --quiet
          pip install requests pillow pytesseract

      - name: Write sync script
        run: |
          cat > sync_skills.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          sync_skills.py  v10
          ════════════════════
          No Gemini. No API keys. Pure Tesseract OCR + Credly API.

          THE BUG THAT WAS FIXED (v8 → v10):
            All LinkedIn Learning cert images are 1280×989 px.
            "Top skills covered" header sits at row ~449 = 45.4% of height.
            v8 tried OCR zone 1 starting at 50% → header not in crop → no pills.
            v8 tried OCR zone 2 starting at 44% → header at pixel row 14 of crop
              → after 3× upscale → row 42 → Tesseract sometimes missed it.
            v10 uses a single zone starting at 42% → header is always well inside
              the crop → Tesseract reliably finds "Top skills covered" every time.

          CREDLY
            Fetches badge_template.skills from public profile.
            Falls back to keeping existing tags if profile is unavailable.

          RULE: NEVER add title, issuer, platform name, or invented text as tags.
                Only real skill pills from OCR or real skills from Credly API.
          """

          import argparse, json, os, re, time
          from pathlib import Path
          import requests
          from PIL import Image, ImageEnhance
          import pytesseract

          CREDLY_USERNAME = 'mohamed-aasiq'

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 '
                            'Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://www.credly.com/',
          }
          TIMEOUT = 20
          DELAY   = 1.2

          JUNK = {
              # Credly platform noise
              'credly','credly badges','acclaim','open badges','digital badges',
              'badges','web-enabled credentials','badge alliance',
              'mozilla open badge standards','mozilla open badges',
              'verified credentials','learning outcomes',
              # LinkedIn cert boilerplate
              'linkedin','linkedin learning','learning path',
              'shea hanson','head of learning content strategy',
              # Generic words that are not skills
              'certificate','professional','certified',
              # Header text that bleeds into OCR when the cert layout shifts
              'top skills covered','top skill covered','skills covered',
              # ── Issuer / brand names — never valid as skill tags ─────────
              'adobe',
              'anaconda','anaconda, inc.','anaconda inc',
              'aha!','aha',
              'american negotiation institute',
              'canonical',
              'cybrary',
              'udemy',
              'openedg c++ institute','openedg',
              'content marketing institute',
              'all tech is human',
              'cisco networking academy',
              'wolfram',
              # "Management" alone is always the Aha! issuer label, not a skill
              'management',
          }

          def is_junk(tag: str) -> bool:
              if len(tag) < 3:
                  return True
              if not re.match(r'[A-Za-z.]', tag):
                  return True
              # Normalise punctuation variants: "Anaconda, Inc." → "anaconda inc"
              normalised = re.sub(r'[,.]', '', tag.lower()).strip()
              normalised = re.sub(r'\s+', ' ', normalised)
              return tag.lower() in JUNK or normalised in JUNK

          def fix_ocr(text: str) -> str:
              text = re.sub(r'\bAl\b', 'AI', text)
              text = re.sub(r'\bMl\b', 'ML', text)
              text = re.sub(r'\bNET\b', '.NET', text)
              text = re.sub(r'\bloT\b', 'IoT', text)
              text = re.sub(r'\blaC\b', 'IaC', text)
              if '(' in text and ')' not in text:
                  text = re.sub(r'\s*\([^)]*$', '', text)
              text = text.strip(' ()[]|~*.,\'"')
              return re.sub(r'\s+', ' ', text).strip()

          # ── Credly ────────────────────────────────────────────────────────────────

          def fetch_credly() -> dict:
              result = {}
              page   = 1
              print(f'\n  Fetching Credly: {CREDLY_USERNAME}')

              while True:
                  url = (f'https://www.credly.com/users/{CREDLY_USERNAME}/badges.json'
                         f'?page={page}&page_size=48')
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                  except Exception as e:
                      print(f'  ✗ Network error: {e}')
                      break

                  if r.status_code == 404:
                      print(f'  ✗ 404 — profile not found or private')
                      break
                  if r.status_code != 200:
                      print(f'  ✗ HTTP {r.status_code}')
                      break

                  try:
                      payload = r.json()
                  except Exception as e:
                      print(f'  ✗ JSON error: {e}')
                      break

                  badges = payload.get('data', [])
                  if not badges:
                      break

                  for b in badges:
                      earner_id = b.get('id', '')
                      tmpl      = b.get('badge_template', {})
                      tmpl_id   = tmpl.get('id', '')
                      skills    = [
                          s['name'].strip()
                          for s in tmpl.get('skills', [])
                          if s.get('name', '').strip()
                          and not is_junk(s['name'].strip())
                      ]
                      if earner_id: result[earner_id] = skills
                      if tmpl_id:   result[tmpl_id]   = skills

                  meta  = payload.get('metadata', {})
                  total = meta.get('total_count', 0)
                  per   = meta.get('per', 48)
                  print(f'    page {page}: {len(badges)} badges  (total={total})')
                  if page * per >= total:
                      break
                  page += 1
                  time.sleep(DELAY)

              n = len(result) // 2 if result else 0
              print(f'  Done: {n} badges\n')
              return result

          # ── OCR pill extraction ────────────────────────────────────────────────────
          #
          # LinkedIn Learning cert images are 1280×989 px.
          # Layout (measured from actual images):
          #   "Top skills covered" header  — rows ~445–470  (45–48% of height)
          #   Skill pills                  — rows ~590–680  (60–69% of height)
          #
          # WHY TWO PASSES:
          #   High contrast (2.5×) makes metadata/header text readable but
          #   DESTROYS pill text — the rounded pill elements are semi-transparent
          #   UI widgets whose text gets blown out at high contrast.
          #   Pass 1 uses high contrast ONLY to confirm the header exists.
          #   Pass 2 uses NO contrast boost on the pill band — pills read cleanly
          #   at native contrast with 3× upscale, and image_to_data gives us
          #   pixel positions so the horizontal-gap pill splitter works correctly.
          #
          OCR_SCALE    = 3   # upscale factor for Tesseract
          OCR_CONF_MIN = 15  # minimum Tesseract word confidence
          PILL_GAP     = 80  # px gap (at 3× scale) between pills vs within a pill

          def _is_noise_line(words: list) -> bool:
              """True if the line looks like background-decoration OCR garbage.
              Real skill text has at least one word longer than 4 letters.
              Noise lines consist entirely of 1–4-char fragments."""
              return all(len(re.sub(r'[^a-zA-Z]', '', w['word'])) <= 4 for w in words)

          def ocr_pills(img_path: Path) -> list:
              try:
                  img = Image.open(img_path).convert('RGB')
              except Exception as e:
                  print(f'    cannot open image: {e}')
                  return []

              w, h = img.size

              # ── Pass 1: confirm "Top skills covered" header ────────────────────
              # High contrast helps metadata text; we only need a yes/no here.
              z1 = (0, int(h * 0.42), w, int(h * 0.73))
              c1 = img.crop(z1)
              c1 = c1.resize((c1.width * OCR_SCALE, c1.height * OCR_SCALE), Image.LANCZOS)
              c1 = ImageEnhance.Contrast(c1).enhance(2.5).convert('L')
              txt1 = pytesseract.image_to_string(c1, config='--psm 6')

              if not re.search(r'top\s+skills?\s+covered', txt1, re.IGNORECASE):
                  print('    ⚠ "Top skills covered" not found — not a LinkedIn Learning cert')
                  return []

              # ── Pass 2: read pills with pixel positions — NO contrast ───────────
              # Pills sit at ~60–69%; a wider band (57–75%) is safe.
              z2 = (0, int(h * 0.57), w, int(h * 0.75))
              c2 = img.crop(z2)
              c2 = c2.resize((c2.width * OCR_SCALE, c2.height * OCR_SCALE), Image.LANCZOS)
              c2 = c2.convert('L')   # greyscale only — NO contrast change

              data = pytesseract.image_to_data(
                  c2, config='--psm 6',
                  output_type=pytesseract.Output.DICT)

              # Collect confident words with pixel positions
              words = []
              for i, word in enumerate(data['text']):
                  if not word.strip():
                      continue
                  if int(data['conf'][i]) < OCR_CONF_MIN:
                      continue
                  words.append({
                      'word':  word,
                      'left':  data['left'][i],
                      'top':   data['top'][i],
                      'right': data['left'][i] + data['width'][i],
                  })

              if not words:
                  print('    ⚠ pass 2 returned no words')
                  return []

              # Group words into lines by vertical proximity
              LINE_TOL = 75
              lines: dict = {}
              for wp in words:
                  key = round(wp['top'] / LINE_TOL) * LINE_TOL
                  lines.setdefault(key, []).append(wp)

              all_pills = []
              for key in sorted(lines):
                  lw = sorted(lines[key], key=lambda x: x['left'])

                  # Skip background-decoration noise (all short fragments)
                  if _is_noise_line(lw):
                      continue

                  ltx = ' '.join(wp['word'] for wp in lw).lower()

                  # Skip the header if it falls inside the pill band
                  if re.search(r'top\s+skills?\s+covered', ltx, re.IGNORECASE):
                      continue

                  # Skip footer bleed
                  if any(x in ltx for x in ['hanson', 'hancon', 'certificate id',
                                             'content strat', 'completed by',
                                             ' utc ', ' hours ', ' minute']):
                      continue

                  if len(re.sub(r'[^a-zA-Z]', '', ltx)) < 3:
                      continue

                  # ── Split by horizontal pixel gap ─────────────────────────────
                  # At 3× scale: within-pill gap ≈ 20–40px, between-pill ≈ 100–150px
                  pill       = []
                  prev_right = None
                  for wp in lw:
                      gap = (wp['left'] - prev_right) if prev_right is not None else 0
                      if prev_right is not None and gap > PILL_GAP:
                          if pill:
                              all_pills.append(' '.join(w['word'] for w in pill))
                              pill = []
                      pill.append(wp)
                      prev_right = wp['right']
                  if pill:
                      all_pills.append(' '.join(wp['word'] for wp in pill))

              if not all_pills:
                  print('    ⚠ header found but no pills extracted from pass 2')
                  return []

              # ── Clean + deduplicate ────────────────────────────────────────────
              seen    = set()
              cleaned = []
              for p in all_pills:
                  p = fix_ocr(p)
                  if is_junk(p):
                      continue
                  if len(re.sub(r'[^a-zA-Z]', '', p)) < 3:
                      continue
                  k = p.lower()
                  if k not in seen:
                      seen.add(k)
                      cleaned.append(p)

              if cleaned:
                  print(f'    ✓ OCR → {cleaned}')
              else:
                  print('    ⚠ header found but no pills survived cleaning')
              return cleaned

          # ── Per-file processing ────────────────────────────────────────────────────

          def process_file(path, frontend_dir, credly_map, dry_run):
              data    = json.loads(path.read_text(encoding='utf-8'))
              creds   = data.get('credentials', [])
              auto    = frontend_dir / 'certificates' / 'auto'
              changed = 0

              for idx, c in enumerate(creds):
                  cid      = c.get('id', '')
                  ctype    = c.get('type', '')
                  old_tags = list(c.get('tags') or [])
                  new_tags = old_tags

                  # ── CREDLY ─────────────────────────────────────────────────────
                  if ctype == 'credly':
                      badge_id = c.get('credlyBadgeId', '') or ''
                      print(f'  [credly] {cid} — {c.get("title","")[:55]}')

                      if credly_map:
                          skills = credly_map.get(badge_id, [])
                          if skills:
                              new_tags = skills
                              print(f'    ✓ {len(new_tags)} skills from Credly')
                          else:
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ badge not in profile — keeping {len(new_tags)} existing')
                      else:
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ profile unavailable — keeping {len(new_tags)} existing')

                  # ── CERT / LINKEDIN: Tesseract OCR ──────────────────────────────
                  else:
                      # Resolve local image: check auto/ first, then cert_logos/
                      img_file = None
                      for ext in ['jpg', 'jpeg', 'png', 'webp']:
                          cand = auto / f'{cid}.{ext}'
                          if cand.exists():
                              img_file = cand
                              break
                      if not img_file:
                          for ext in ['jpg', 'jpeg', 'png']:
                              cand = frontend_dir / 'cert_logos' / f'{cid}_image.{ext}'
                              if cand.exists():
                                  img_file = cand
                                  break

                      print(f'  [cert]   {cid} — {c.get("title","")[:55]}')

                      if img_file:
                          ocr = ocr_pills(img_file)
                          if ocr:
                              new_tags = ocr
                              print(f'    ✓ OCR → {new_tags}')
                          else:
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ OCR empty — keeping {len(new_tags)} existing')
                      else:
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ no image — keeping {len(new_tags)} existing')

                  # Deduplicate preserving order
                  seen    = set()
                  deduped = []
                  for t in new_tags:
                      k = t.lower()
                      if k not in seen:
                          seen.add(k)
                          deduped.append(t)
                  new_tags = deduped

                  if new_tags != old_tags:
                      if not dry_run:
                          creds[idx]['tags'] = new_tags
                      changed += 1
                      if dry_run:
                          print(f'    [dry-run] would set: {new_tags}')

              if changed > 0 and not dry_run:
                  data['credentials'] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding='utf-8')
                  print(f'\n  ✅  Saved {path.name} ({changed} updated)\n')

              return changed, len(creds)

          # ── Main ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument('--dir',     default='.')
          parser.add_argument('--dry-run', action='store_true')
          parser.add_argument('--file',    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1, 2, 3, 4]

          credly_map = fetch_credly()

          total_changed = total_creds = 0
          for n in nums:
              p = frontend / f'data_creds_{n}.json'
              if not p.exists():
                  continue
              print(f'\n{"="*60}\n  data_creds_{n}.json\n{"="*60}')
              chg, cnt = process_file(p, frontend, credly_map, args.dry_run)
              total_changed += chg
              total_creds   += cnt

          print(f'\n{"="*60}')
          print(f'  Done.  Updated: {total_changed} / {total_creds}')
          if args.dry_run:
              print('  (dry-run — nothing written)')
          print(f'{"="*60}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as f:
                  f.write('## Skill Sync v10\n')
                  f.write(f'- Credly: `{CREDLY_USERNAME}`'
                          f' — {len(credly_map)//2} badges\n')
                  f.write(f'- Updated: {total_changed}/{total_creds}\n')
                  if args.dry_run:
                      f.write('- **DRY RUN — nothing written**\n')
          PYEOF

      - name: Sync skills
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}"  ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python sync_skills.py $ARGS"
          python sync_skills.py $ARGS

      - name: Commit updated tags
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync credential skills [skip ci]"
            git push
          fi
