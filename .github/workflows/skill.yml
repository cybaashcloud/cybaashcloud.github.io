name: Fetch Missing Cert Images

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Only process one file (leave blank for all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
      dry_run:
        description: 'Dry run — list creds without fetching'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 0'

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf pillow google-generativeai

      - name: Write fetch script
        run: |
          cat > fetch_cert_images.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          fetch_cert_images.py  v4
          ════════════════════════
          Routing by ISSUER NAME.  AWS and Cisco do not have scrapeable pages.

          ┌──────────────────────────────┬────────────────────────────────────────┐
          │ Issuer contains              │ Strategy                               │
          ├──────────────────────────────┼────────────────────────────────────────┤
          │ "Amazon Web Services"        │ Render each PDF page → Gemini Vision   │
          │                              │ reads course title → matched to cert   │
          │                              │ entry by word overlap (title vs title) │
          ├──────────────────────────────┼────────────────────────────────────────┤
          │ "Cisco" (type=certificate)   │ Static CISCO_PDF_MAP                   │
          │                              │ PDF filename → cert ID                 │
          ├──────────────────────────────┼────────────────────────────────────────┤
          │ Everything else              │ og:image scrape from URL               │
          └──────────────────────────────┴────────────────────────────────────────┘

          Why Gemini for AWS?
            AWS SkillBuilder PDFs have compressed text streams.  PyMuPDF can
            decompress them, but all 9 PDFs share boilerplate ("AWS", "Security",
            "Getting Started") that wrecks word-overlap title matching.
            Gemini Vision reads the rendered page image directly and returns a
            clean course title → reliable title-to-title comparison.
          """

          import argparse, base64, json, os, re, time
          from pathlib import Path
          from urllib.parse import urlparse

          import requests
          from bs4 import BeautifulSoup
          import fitz          # PyMuPDF
          from PIL import Image
          import google.generativeai as genai

          # ── Config ────────────────────────────────────────────────────────────────

          HEADERS = {
              "User-Agent": (
                  "Mozilla/5.0 (X11; Linux x86_64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/124.0.0.0 Safari/537.36"
              ),
              "Accept-Language": "en-US,en;q=0.9",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Referer": "https://www.linkedin.com/",
          }
          IMG_HEADERS = {
              "User-Agent": HEADERS["User-Agent"],
              "Referer": "https://www.linkedin.com/",
              "Accept": "image/avif,image/webp,image/apng,image/*,*/*;q=0.8",
          }
          DELAY_PAGE, DELAY_IMG, TIMEOUT = 0.9, 0.4, 15
          AUTO_DIR_REL = "certificates/auto"

          # Cisco: PDF filename → cert ID  (add new lines when new Cisco PDFs arrive)
          CISCO_PDF_MAP = {
              "cisco_packet_tracer.pdf": "pro011",
          }

          # ── Issuer helpers ─────────────────────────────────────────────────────────

          def is_aws(issuer: str) -> bool:
              return "amazon web services" in issuer.lower()

          def is_cisco_cert(issuer: str, ctype: str) -> bool:
              return "cisco" in issuer.lower() and ctype != "credly"

          # ── og:image scraper ───────────────────────────────────────────────────────

          def fetch_og(page_url: str):
              try:
                  r = requests.get(page_url, headers=HEADERS, timeout=TIMEOUT,
                                   allow_redirects=True)
                  if r.status_code != 200:
                      print(f"    page HTTP {r.status_code}")
                      return None
                  soup = BeautifulSoup(r.text, "html.parser")
                  for prop in ["og:image", "og:image:secure_url"]:
                      tag = soup.find("meta", property=prop)
                      if tag and tag.get("content"):
                          return tag["content"].strip()
                  tag = soup.find("meta", attrs={"name": "twitter:image"})
                  if tag and tag.get("content"):
                      return tag["content"].strip()
                  for img in soup.find_all("img"):
                      src = img.get("src", "")
                      alt = img.get("alt", "").lower()
                      if ("certificate" in alt or "cert" in src.lower()) and src.startswith("http"):
                          return src.strip()
              except Exception as e:
                  print(f"    fetch error: {e}")
              return None

          def download_image(img_url: str, save_dir: Path, cred_id: str):
              try:
                  r = requests.get(img_url, headers=IMG_HEADERS, timeout=TIMEOUT, stream=True)
                  if r.status_code != 200:
                      print(f"    image HTTP {r.status_code}")
                      return None
                  ct  = r.headers.get("Content-Type", "image/jpeg")
                  ext = "png" if "png" in ct else "webp" if "webp" in ct else "jpg"
                  up  = urlparse(img_url).path.lower()
                  for e in ["png", "webp", "gif"]:
                      if up.endswith(f".{e}"):
                          ext = e; break
                  fname = f"{cred_id}.{ext}"
                  dest  = save_dir / fname
                  save_dir.mkdir(parents=True, exist_ok=True)
                  with open(dest, "wb") as fh:
                      for chunk in r.iter_content(8192): fh.write(chunk)
                  kb = dest.stat().st_size / 1024
                  print(f"    saved {fname} ({kb:.0f} KB)")
                  return fname
              except Exception as e:
                  print(f"    download error: {e}")
              return None

          # ── PDF → JPEG renderer ────────────────────────────────────────────────────

          def pdf_to_jpeg(pdf_path: Path, out_path: Path, dpi: int = 150) -> bool:
              try:
                  doc  = fitz.open(str(pdf_path))
                  page = doc[0]
                  mat  = fitz.Matrix(dpi / 72, dpi / 72)
                  pix  = page.get_pixmap(matrix=mat, colorspace=fitz.csRGB)
                  img  = Image.frombytes("RGB", [pix.width, pix.height], pix.samples)
                  out_path.parent.mkdir(parents=True, exist_ok=True)
                  img.save(str(out_path), "JPEG", quality=88, optimize=True)
                  kb = out_path.stat().st_size / 1024
                  print(f"    rendered {pdf_path.name} → {out_path.name} ({kb:.0f} KB)")
                  return True
              except Exception as e:
                  print(f"    PDF render error ({pdf_path.name}): {e}")
                  return False

          # ── Gemini: read course title from rendered PDF JPEG ───────────────────────

          _gemini_model = None

          def get_gemini():
              global _gemini_model
              if _gemini_model is None:
                  key = os.environ.get("GEMINI_API_KEY", "")
                  if not key:
                      raise RuntimeError("GEMINI_API_KEY secret is not set")
                  genai.configure(api_key=key)
                  _gemini_model = genai.GenerativeModel("gemini-1.5-flash")
              return _gemini_model

          TITLE_PROMPT = """\
          This is an AWS SkillBuilder certificate of completion.
          What is the exact course or training name printed on this certificate?
          Return ONLY the course name as plain text — no quotes, no explanation, nothing else.
          """

          def gemini_pdf_title(jpeg_path: Path) -> str:
              """Ask Gemini to read the course title from a rendered AWS cert JPEG."""
              try:
                  with open(jpeg_path, "rb") as fh:
                      b64 = base64.b64encode(fh.read()).decode()
                  resp = get_gemini().generate_content([
                      {"inline_data": {"mime_type": "image/jpeg", "data": b64}},
                      TITLE_PROMPT,
                  ])
                  title = resp.text.strip().strip('"\'')
                  print(f"    Gemini title: {title}")
                  return title
              except Exception as e:
                  print(f"    Gemini title error: {e}")
                  return ""

          # ── Word-overlap similarity (used AFTER Gemini gives us a clean title) ─────

          STOP = {"and","the","a","an","of","for","to","in","with","by","is","are",
                  "on","at","from","or","its","this","that","includes","labs","getting",
                  "started","plan","course"}

          def word_overlap(a: str, b: str) -> float:
              wa = set(re.findall(r"[a-z0-9]+", a.lower())) - STOP
              wb = set(re.findall(r"[a-z0-9]+", b.lower())) - STOP
              if not wa or not wb:
                  return 0.0
              return len(wa & wb) / max(len(wa), len(wb))

          # ── AWS: render all PDFs → Gemini → match to cert entries ─────────────────

          def match_aws_pdfs(pdf_dir: Path, aws_certs: list, tmp_dir: Path) -> dict:
              """
              1. Render each AWS PDF first page → tmp JPEG
              2. Ask Gemini Vision for the course title
              3. Match Gemini title against cert titles by word overlap
              Returns {cert_id: pdf_path}.
              """
              pdfs = sorted(pdf_dir.glob("*.pdf"))
              if not pdfs:
                  print(f"  ⚠ No PDFs in {pdf_dir}")
                  return {}

              print(f"\n  Processing {len(pdfs)} AWS PDF(s) via Gemini Vision…")
              tmp_dir.mkdir(parents=True, exist_ok=True)

              # Step 1+2: render each PDF → JPEG, then ask Gemini for its title
              pdf_titles = {}
              for p in pdfs:
                  tmp_jpg = tmp_dir / f"_tmp_{p.stem}.jpg"
                  if not pdf_to_jpeg(p, tmp_jpg):
                      print(f"    skip {p.name} (render failed)")
                      continue
                  title = gemini_pdf_title(tmp_jpg)
                  pdf_titles[p] = title
                  time.sleep(1.2)   # rate-limit Gemini

              # Step 3: match each cert to the best-scoring PDF title
              print(f"\n  Matching {len(pdf_titles)} PDF titles → {len(aws_certs)} certs…")
              mapping   = {}
              used_pdfs = set()

              for c in sorted(aws_certs, key=lambda x: x["id"]):
                  cid    = c["id"]
                  ctitle = c.get("title", "")
                  best_score, best_pdf = 0.0, None

                  for p, gtitle in pdf_titles.items():
                      if p in used_pdfs or not gtitle:
                          continue
                      score = word_overlap(ctitle, gtitle)
                      if score > best_score:
                          best_score = score
                          best_pdf   = p

                  if best_pdf and best_score >= 0.3:
                      mapping[cid] = best_pdf
                      used_pdfs.add(best_pdf)
                      print(f"    ✓ {cid}  score={best_score:.2f}")
                      print(f"      cert:  {ctitle}")
                      print(f"      gemini:{pdf_titles[best_pdf]}")
                  else:
                      print(f"    ✗ {cid}  no match (best={best_score:.2f})  cert: {ctitle}")

              return mapping

          # ── Per-file processor ─────────────────────────────────────────────────────

          def process_file(path: Path, frontend_dir: Path, dry_run: bool):
              data  = json.loads(path.read_text(encoding="utf-8"))
              creds = data.get("credentials", [])
              auto  = frontend_dir / AUTO_DIR_REL

              aws_pending = [
                  c for c in creds
                  if not (c.get("image") or "")
                  and c.get("type") != "credly"
                  and is_aws(c.get("issuer", ""))
              ]
              aws_map = {}
              if aws_pending:
                  pdf_dir = frontend_dir / "certificates" / "aws"
                  tmp_dir = frontend_dir / "certificates" / ".tmp_renders"
                  aws_map = match_aws_pdfs(pdf_dir, aws_pending, tmp_dir)
                  # Clean up temp renders
                  import shutil
                  if tmp_dir.exists():
                      shutil.rmtree(tmp_dir)

              fetched = skipped = 0
              changed = False

              for idx, c in enumerate(creds):
                  img    = c.get("image") or ""
                  url    = c.get("url")   or ""
                  ctype  = c.get("type",  "")
                  cid    = c["id"]
                  issuer = c.get("issuer", "")

                  if img or ctype == "credly":
                      skipped += 1
                      continue

                  print(f"\n[{cid}] {c.get('title','')[:65]}")
                  print(f"  issuer: {issuer}")

                  if dry_run:
                      if is_aws(issuer):
                          pdf = aws_map.get(cid)
                          print(f"  → AWS PDF: {pdf.name if pdf else 'NO GEMINI MATCH'}")
                      elif is_cisco_cert(issuer, ctype):
                          mapped = next((f for f,i in CISCO_PDF_MAP.items() if i==cid), None)
                          print(f"  → Cisco PDF: {mapped or 'NOT IN CISCO_PDF_MAP'}")
                      else:
                          print(f"  → og:image scrape: {url or '(no URL)'}")
                      continue

                  saved_fname  = None
                  pdf_rel_path = None

                  # ── AWS ──────────────────────────────────────────────────────────
                  if is_aws(issuer):
                      pdf_path = aws_map.get(cid)
                      if not pdf_path:
                          print(f"  ✗ Gemini could not match a PDF for {cid}")
                          skipped += 1
                          continue
                      out_path = auto / f"{cid}.jpg"
                      if pdf_to_jpeg(pdf_path, out_path):
                          saved_fname  = f"{cid}.jpg"
                          pdf_rel_path = f"/certificates/aws/{pdf_path.name}"
                      else:
                          skipped += 1
                          continue

                  # ── Cisco ────────────────────────────────────────────────────────
                  elif is_cisco_cert(issuer, ctype):
                      cisco_dir = frontend_dir / "certificates"
                      pdf_fname = next((f for f,i in CISCO_PDF_MAP.items() if i==cid), None)
                      if not pdf_fname:
                          print(f"  ⚠ {cid} not in CISCO_PDF_MAP — add mapping and re-run")
                          skipped += 1
                          continue
                      pdf_path = cisco_dir / pdf_fname
                      if not pdf_path.exists():
                          print(f"  ✗ PDF not found: {pdf_path}")
                          skipped += 1
                          continue
                      out_path = auto / f"{cid}.jpg"
                      if pdf_to_jpeg(pdf_path, out_path):
                          saved_fname  = f"{cid}.jpg"
                          pdf_rel_path = f"/certificates/{pdf_fname}"
                      else:
                          skipped += 1
                          continue

                  # ── All others: og:image scrape ───────────────────────────────────
                  else:
                      if not url:
                          print(f"  ✗ no URL — skipping")
                          skipped += 1
                          continue
                      print(f"  url: {url}")
                      og = fetch_og(url)
                      time.sleep(DELAY_PAGE)
                      if not og:
                          print(f"  ✗ no og:image")
                          skipped += 1
                          continue
                      print(f"  og: {og[:80]}")
                      saved_fname = download_image(og, auto, cid)
                      time.sleep(DELAY_IMG)
                      if not saved_fname:
                          skipped += 1
                          continue

                  creds[idx]["image"] = f"/{AUTO_DIR_REL}/{saved_fname}"
                  if pdf_rel_path:
                      creds[idx]["pdfUrl"] = pdf_rel_path
                      print(f"  ✓ pdfUrl → {pdf_rel_path}")

                  fetched += 1
                  changed  = True

              if changed and not dry_run:
                  data["credentials"] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding="utf-8")
                  print(f"\nSaved {path.name} (+{fetched} images)")

              return fetched, skipped

          # ── Main ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument("--dir",     default=".")
          parser.add_argument("--dry-run", action="store_true")
          parser.add_argument("--file",    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1,2,3,4]
          tf = ts  = 0
          for n in nums:
              p = frontend / f"data_creds_{n}.json"
              if not p.exists(): continue
              print(f"\n{'='*60}\n  data_creds_{n}.json\n{'='*60}")
              f, s = process_file(p, frontend, args.dry_run)
              tf += f; ts += s

          print(f"\n{'='*60}")
          print(f"  Done.  Rendered/fetched={tf}  Skipped={ts}")
          print(f"{'='*60}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write("## Cert Image Fetch v4 (Gemini Vision)\n")
                  fh.write(f"- **Rendered / fetched:** {tf}\n")
                  fh.write(f"- **Skipped:** {ts}\n")
          PYEOF

      - name: Fetch missing cert images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}"  ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python fetch_cert_images.py $ARGS"
          python fetch_cert_images.py $ARGS

      - name: Commit images and updated JSON
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/certificates/auto/ frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes — all images already present."
          else
            COUNT=$(git diff --cached --name-only | grep -c "certificates/auto" || true)
            git commit -m "feat: render ${COUNT} PDF cert images [skip ci]"
            git push
            echo "Pushed ${COUNT} new cert images."
          fi
