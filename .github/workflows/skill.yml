name: Sync Credential Skills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show changes without saving'
        required: false
        default: false
        type: boolean
      file:
        description: 'Only process one creds file (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
  schedule:
    - cron: '30 3 * * 0'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr --quiet
          pip install pillow pytesseract

      - name: Write sync script
        run: |
          cat > sync_skills.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          sync_skills.py  v3
          ──────────────────
          Wipes ALL existing tags on every credential and replaces them with
          accurate, individual technical skill tags.

          CREDLY badges
            → Skills come from CREDLY_SKILLS dict (hardcoded — Credly blocks scrapers).
              To add a new badge: paste its badge ID and skill list into CREDLY_SKILLS.

          LINKEDIN / certificate images
            → OCR the cert image, find the 'Top skills covered' section,
              split individual pill-badges by horizontal gap detection,
              clean up OCR artefacts (merged text, Al→AI, truncated endings).

          BOTH types
            → Issuer tag is NOT added (issuers are not skills).
            → Tags that are clearly issuer names or platform names are stripped.
          """

          import argparse, json, os, re
          from pathlib import Path
          from PIL import Image, ImageEnhance
          import pytesseract

          # ── Credly hardcoded skills ──────────────────────────────────────────────
          # Credly.com blocks automated scraping. Skills are sourced from the
          # official badge pages / syllabi for each badge ID.
          # Add new badges here: "badge-uuid": ["Skill 1", "Skill 2", ...]

          CREDLY_SKILLS = {
              # AWS Knowledge: Security Champion
              "367dd6a6-50e5-4f91-b6a7-7cafac8c0e85": [
                  "AWS Security", "Cloud Security", "IAM", "Threat Detection",
                  "Security Best Practices", "AWS",
              ],
              # Ethical Hacker (Cisco)
              "d74c31a5-1c39-4231-aaaf-07b6a91ffac6": [
                  "Ethical Hacking", "Penetration Testing", "Network Security",
                  "Vulnerability Assessment", "Reconnaissance", "Web Application Security",
                  "Social Engineering", "Exploitation",
              ],
              # Introduction to Cybersecurity (Cisco)
              "a5afa998-3795-44d8-87c2-6969c429a63a": [
                  "Cybersecurity Fundamentals", "Network Security", "Cyber Threats",
                  "Malware", "Data Protection", "Online Safety",
              ],
              # Junior Cybersecurity Analyst Career Path (Cisco)
              "0d01ce71-a9b0-476a-b1c1-af91589e317a": [
                  "SOC Operations", "Threat Analysis", "Incident Response",
                  "SIEM", "Network Monitoring", "Vulnerability Management",
                  "Digital Forensics", "Security Policies",
              ],
              # AWS Cloud Quest: Cloud Practitioner
              "3396b91c-16ef-4e86-a89c-c32394c0077e": [
                  "AWS", "Cloud Computing", "Cloud Architecture",
                  "EC2", "S3", "Cloud Practitioner", "AWS Services",
              ],
          }

          # ── Strings that are issuers / platforms, NOT skills ─────────────────────
          # Any tag that matches one of these (case-insensitive) is stripped out.

          ISSUER_JUNK = {
              "credly", "credly badges", "acclaim", "open badges", "digital badges",
              "badges", "web-enabled credentials", "badge alliance",
              "mozilla open badge standards", "mozilla open badges",
              "verified credentials", "learning outcomes",
              "linkedin", "linkedin learning", "learning path",
              "github", "microsoft", "adobe", "cisco", "amazon web services (aws)",
              "cisco networking academy", "cisco netacad",
              "all tech is human", "anaconda, inc.", "anaconda",
              "wolfram", "wolfram research", "knime", "snowflake",
              "cybrary", "docker, inc", "grammarly", "hootsuite",
              "intuit mailchimp", "jack welch management institute",
              "jetbrains", "lambdatest", "moz", "mozilla",
              "openedg c++ institute", "openedg python institute",
              "pagerduty", "servicenow", "toastmasters international",
              "udemy", "weaviate", "zendesk", "content marketing institute",
              "blue team",  # mistakenly added as issuer on pro018
          }

          # ── OCR helpers ──────────────────────────────────────────────────────────

          OCR_FIXES = [
              (r'\bAl\b',  'AI'),   # OCR misreads 'I' as 'l'
              (r'\bMl\b',  'ML'),
              (r'\s*\($',  ''),     # trailing open-paren artefact
              (r'\($',     ''),
              (r'\s+',     ' '),    # collapse double-spaces
          ]

          def normalise(tag: str) -> str:
              tag = tag.strip(' ()[]|•·-_,')
              for pat, repl in OCR_FIXES:
                  tag = re.sub(pat, repl, tag)
              return tag.strip()

          def is_junk(tag: str) -> bool:
              return tag.lower() in ISSUER_JUNK or len(tag) < 3

          def split_merged(tag: str) -> list[str]:
              """
              The old workflow sometimes stored multiple skills as ONE tag,
              e.g. 'Cybersecurity Information Security Awareness'.
              
              Split on Title Case boundaries — each new capitalised word-group
              that looks like a standalone skill becomes its own tag.

              Heuristic: split where a lowercase word is followed by an uppercase
              word, and the segment so far is >= 3 chars and <= 40 chars.
              """
              # First try: if tag contains known separator patterns keep as-is
              if len(tag) <= 35:
                  return [tag]

              # Split on transitions: lowercase→uppercase (not inside acronyms)
              parts = re.split(r'(?<=[a-z])\s+(?=[A-Z])', tag)
              if len(parts) > 1:
                  result = []
                  for p in parts:
                      p = normalise(p)
                      if not is_junk(p):
                          result.append(p)
                  return result if result else [tag]
              return [tag]

          def ocr_zone(img: Image.Image, box: tuple) -> list[str]:
              """Crop image to box, OCR it, return individual skill pill strings."""
              crop = img.crop(box)
              scale = 3
              crop = crop.resize((crop.width * scale, crop.height * scale), Image.LANCZOS)
              crop = ImageEnhance.Contrast(crop).enhance(2.5)
              crop = crop.convert('L')

              data = pytesseract.image_to_data(
                  crop, config='--psm 6',
                  output_type=pytesseract.Output.DICT
              )

              words = []
              for i, word in enumerate(data['text']):
                  if not word.strip():
                      continue
                  if int(data['conf'][i]) < 20:
                      continue
                  words.append({
                      'word':  word,
                      'left':  data['left'][i],
                      'top':   data['top'][i],
                      'right': data['left'][i] + data['width'][i],
                  })

              if not words:
                  return []

              # Group words into lines
              LINE_TOL = 75
              lines: dict[int, list] = {}
              for wp in words:
                  key = round(wp['top'] / LINE_TOL) * LINE_TOL
                  lines.setdefault(key, []).append(wp)

              # Find 'Top skills covered' header line
              found = False
              skill_lines = []
              for key in sorted(lines):
                  text = ' '.join(w['word'] for w in lines[key])
                  if re.search(r'top\s+skills?\s+covered', text, re.IGNORECASE):
                      found = True
                      continue
                  if found and text.strip():
                      skill_lines.append(sorted(lines[key], key=lambda x: x['left']))

              if not skill_lines:
                  return []

              # Split each line into individual pills by horizontal gap
              PILL_GAP = 100 * scale
              skills: list[str] = []

              for wgroup in skill_lines:
                  pill: list[str] = []
                  prev_right = None
                  for wp in wgroup:
                      gap = (wp['left'] - prev_right) if prev_right is not None else 0
                      if prev_right is not None and gap > PILL_GAP:
                          if pill:
                              tag = normalise(' '.join(pill))
                              if not is_junk(tag):
                                  skills.append(tag)
                          pill = []
                      pill.append(wp['word'])
                      prev_right = wp['right']
                  if pill:
                      tag = normalise(' '.join(pill))
                      if not is_junk(tag):
                          skills.append(tag)

              return skills

          def ocr_skills(img_path: Path) -> list[str]:
              """Try multiple crop zones to handle different LinkedIn cert layouts."""
              try:
                  img = Image.open(img_path).convert('RGB')
              except Exception as e:
                  print(f'    cannot open image: {e}')
                  return []

              w, h = img.size
              zones = [
                  (0, int(h * 0.50), w, int(h * 0.72)),   # current layout
                  (0, int(h * 0.44), w, int(h * 0.68)),   # older layout
                  (0, int(h * 0.50), w, h),                # wide fallback
              ]
              for zone in zones:
                  result = ocr_zone(img, zone)
                  if result:
                      return result
              return []

          # ── Per-file processing ──────────────────────────────────────────────────

          def clean_existing_tags(old_tags: list[str]) -> list[str]:
              """
              Clean up tags that were already stored (merged strings, junk issuers).
              Used as a fallback when OCR finds nothing new.
              """
              cleaned = []
              for tag in old_tags:
                  tag = normalise(tag)
                  if is_junk(tag):
                      continue
                  # Split merged tags
                  for part in split_merged(tag):
                      part = normalise(part)
                      if not is_junk(part) and part not in cleaned:
                          cleaned.append(part)
              return cleaned

          def process_file(path: Path, frontend_dir: Path, dry_run: bool) -> tuple[int, int]:
              data  = json.loads(path.read_text(encoding='utf-8'))
              creds = data.get('credentials', [])
              auto_dir = frontend_dir / 'certificates' / 'auto'
              updated = changed = 0

              for idx, c in enumerate(creds):
                  cid      = c.get('id', '')
                  ctype    = c.get('type', '')
                  old_tags = c.get('tags', [])
                  new_tags: list[str] = []

                  # ── Credly: use hardcoded skills dict ──────────────────────────
                  if ctype == 'credly':
                      badge_id = c.get('credlyBadgeId', '')
                      if badge_id in CREDLY_SKILLS:
                          new_tags = CREDLY_SKILLS[badge_id]
                          print(f'  [credly] {cid} — {c.get("title","")[:50]}')
                          print(f'    -> {new_tags}')
                      else:
                          print(f'  [credly] {cid} — badge ID not in CREDLY_SKILLS, cleaning existing tags')
                          new_tags = clean_existing_tags(old_tags)

                  # ── LinkedIn / certificate: OCR image ──────────────────────────
                  else:
                      img_file = None
                      for ext in ['jpg', 'jpeg', 'png', 'webp']:
                          cand = auto_dir / f'{cid}.{ext}'
                          if cand.exists():
                              img_file = cand
                              break

                      if not img_file:
                          img_field = c.get('image') or c.get('pdf') or ''
                          if img_field and not img_field.endswith('.pdf'):
                              loc = frontend_dir / img_field.lstrip('/')
                              if loc.exists():
                                  img_file = loc

                      if img_file:
                          print(f'  [cert]   {cid} — {c.get("title","")[:50]}')
                          ocr_result = ocr_skills(img_file)
                          if ocr_result:
                              new_tags = ocr_result
                              print(f'    OCR -> {new_tags}')
                          else:
                              print(f'    OCR empty — cleaning existing tags')
                              new_tags = clean_existing_tags(old_tags)
                      else:
                          print(f'  [cert]   {cid} — no image, cleaning existing tags')
                          new_tags = clean_existing_tags(old_tags)

                  # Strip any remaining junk that slipped through
                  new_tags = [t for t in new_tags if not is_junk(t)]

                  # Deduplicate preserving order
                  seen: set[str] = set()
                  deduped: list[str] = []
                  for t in new_tags:
                      if t not in seen:
                          seen.add(t)
                          deduped.append(t)
                  new_tags = deduped

                  if new_tags != old_tags:
                      print(f'    CHANGED: {len(old_tags)} tags -> {len(new_tags)} tags')
                      if not dry_run:
                          creds[idx]['tags'] = new_tags
                      changed += 1
                  updated += 1

              if changed > 0 and not dry_run:
                  data['credentials'] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding='utf-8'
                  )
                  print(f'\n  Saved {path.name} ({changed} credentials updated)')

              return changed, updated

          # ── CLI ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument('--dir',     default='.')
          parser.add_argument('--dry-run', action='store_true')
          parser.add_argument('--file',    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1, 2, 3, 4]
          total_changed = total_processed = 0

          for n in nums:
              p = frontend / f'data_creds_{n}.json'
              if not p.exists():
                  continue
              print(f'\n{"="*60}\n  data_creds_{n}.json\n{"="*60}')
              c, u = process_file(p, frontend, args.dry_run)
              total_changed   += c
              total_processed += u

          print(f'\n{"="*60}')
          print(f'  Done. Updated: {total_changed} / {total_processed} credentials')
          if args.dry_run:
              print('  (dry-run — nothing written)')
          print(f'{"="*60}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as f:
                  f.write(f'## Skill Sync Results\n')
                  f.write(f'- Credentials updated: **{total_changed} / {total_processed}**\n')
                  f.write(f'- Credly tags: hardcoded skill dict\n')
                  f.write(f'- LinkedIn tags: OCR pill-split + junk removal\n')
          PYEOF

      - name: Sync skills
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}" ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python sync_skills.py $ARGS"
          python sync_skills.py $ARGS

      - name: Commit updated tags
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync credential skills — fix OCR pill-split + Credly skill dict"
            git push
            echo "Pushed."
          fi
