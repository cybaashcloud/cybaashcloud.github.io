name: Sync Credential Skills

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show changes without saving)'
        required: false
        default: false
        type: boolean
      file:
        description: 'Only process one creds file (blank = all)'
        required: false
        default: ''
        type: choice
        options: ['', '1', '2', '3', '4']
  schedule:
    - cron: '30 3 * * 0'

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pillow google-generativeai

      - name: Write sync script
        run: |
          cat > sync_skills.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          sync_skills.py  v9
          ══════════════════
          CREDLY
            URL: https://www.credly.com/users/mohamed-aasiq/badges.json
            Tags = badge_template.skills only (no names, no titles, no issuer).
            If profile 404 or private → keep existing tags unchanged.

          LINKEDIN / CERTIFICATE images  ← GEMINI VISION (replaces Tesseract OCR)
            Sends the local cert image to Gemini 1.5 Flash.
            Prompt asks ONLY for the pills shown in the "Top skills covered" section.
            No issuer name, no cert title, no person name — only technical skill tags.
            If Gemini returns nothing or the image is missing → keep existing tags.

          RULE: NEVER add title, issuer, platform, or any invented text as tags.
                Only real skill pills from Gemini vision or real skills from Credly API.
          """

          import argparse, base64, json, os, re, time
          from pathlib import Path
          import requests

          import google.generativeai as genai

          CREDLY_USERNAME = 'mohamed-aasiq'

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 '
                            'Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://www.credly.com/',
          }
          TIMEOUT = 20
          DELAY   = 1.2

          # Words/phrases that must NEVER appear as skill tags
          JUNK = {
              'credly', 'credly badges', 'acclaim', 'open badges', 'digital badges',
              'badges', 'web-enabled credentials', 'badge alliance',
              'mozilla open badge standards', 'mozilla open badges',
              'verified credentials', 'learning outcomes',
              'linkedin', 'linkedin learning', 'learning path',
              'shea hanson', 'head of learning content strategy',
          }

          def is_junk(tag: str) -> bool:
              if len(tag) < 3:
                  return True
              if not re.match(r'[A-Za-z.]', tag):
                  return True
              return tag.lower() in JUNK

          # ── Credly live fetch ──────────────────────────────────────────────────────

          def fetch_credly() -> dict:
              result = {}
              page   = 1
              print(f'\n  Fetching Credly: {CREDLY_USERNAME}')

              while True:
                  url = (f'https://www.credly.com/users/{CREDLY_USERNAME}/badges.json'
                         f'?page={page}&page_size=48')
                  try:
                      r = requests.get(url, headers=HEADERS, timeout=TIMEOUT)
                  except Exception as e:
                      print(f'  ✗ Network error: {e}')
                      break

                  if r.status_code == 404:
                      print(f'  ✗ 404 — profile not found or private')
                      break
                  if r.status_code != 200:
                      print(f'  ✗ HTTP {r.status_code}')
                      break

                  try:
                      payload = r.json()
                  except Exception as e:
                      print(f'  ✗ JSON error: {e}')
                      break

                  badges = payload.get('data', [])
                  if not badges:
                      break

                  for b in badges:
                      earner_id = b.get('id', '')
                      tmpl      = b.get('badge_template', {})
                      tmpl_id   = tmpl.get('id', '')
                      skills    = [
                          s['name'].strip()
                          for s in tmpl.get('skills', [])
                          if s.get('name', '').strip()
                          and not is_junk(s['name'].strip())
                      ]
                      if earner_id: result[earner_id] = skills
                      if tmpl_id:   result[tmpl_id]   = skills

                  meta  = payload.get('metadata', {})
                  total = meta.get('total_count', 0)
                  per   = meta.get('per', 48)
                  print(f'    page {page}: {len(badges)} badges  (total={total})')
                  if page * per >= total:
                      break
                  page += 1
                  time.sleep(DELAY)

              n = len(result) // 2 if result else 0
              print(f'  Done: {n} badges\n')
              return result

          # ── Gemini Vision: extract "Top skills covered" pills ──────────────────────

          _gemini_model = None

          def get_gemini_model():
              global _gemini_model
              if _gemini_model is None:
                  api_key = os.environ.get('GEMINI_API_KEY', '')
                  if not api_key:
                      raise RuntimeError('GEMINI_API_KEY secret is not set')
                  genai.configure(api_key=api_key)
                  _gemini_model = genai.GenerativeModel('gemini-1.5-flash')
              return _gemini_model

          SKILL_PROMPT = """\
          Look at this LinkedIn Learning certificate image carefully.
          Find the section labelled "Top skills covered".
          Return ONLY a JSON array of the skill pill labels shown in that section — exactly as they are written in the image.

          Rules:
          - Do NOT include: the course title, issuer/platform name, person's name, dates, hours, or the header "Top skills covered" itself.
          - Do NOT invent any skills. Only return what is literally printed as pills/tags.
          - If the section is not visible or has no pills, return an empty array: []

          Reply with ONLY the raw JSON array, nothing else.
          Example: ["Python", "Machine Learning", "Data Analysis"]
          """

          def gemini_skills(img_path: Path) -> list:
              """
              Send img_path to Gemini Vision and return the list of technical
              skill pills from the "Top skills covered" section.
              Returns [] on any error or if the section is absent.
              """
              try:
                  model = get_gemini_model()

                  with open(img_path, 'rb') as fh:
                      raw = fh.read()
                  b64 = base64.b64encode(raw).decode()

                  ext  = img_path.suffix.lower().lstrip('.')
                  mime = {
                      'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
                      'png': 'image/png',  'webp': 'image/webp',
                  }.get(ext, 'image/jpeg')

                  response = model.generate_content([
                      {'inline_data': {'mime_type': mime, 'data': b64}},
                      SKILL_PROMPT,
                  ])

                  text = response.text.strip()
                  # Strip markdown code fences if Gemini wraps in ```json … ```
                  text = re.sub(r'^```(?:json)?\s*|\s*```$', '', text, flags=re.MULTILINE).strip()

                  skills = json.loads(text)
                  if not isinstance(skills, list):
                      return []

                  cleaned = []
                  seen    = set()
                  for s in skills:
                      s = str(s).strip()
                      if not s or is_junk(s):
                          continue
                      k = s.lower()
                      if k not in seen:
                          seen.add(k)
                          cleaned.append(s)
                  return cleaned

              except json.JSONDecodeError as e:
                  print(f'    ⚠ Gemini returned non-JSON: {e}')
                  return []
              except Exception as e:
                  print(f'    ⚠ Gemini error: {e}')
                  return []

          # ── Per-file processing ────────────────────────────────────────────────────

          def process_file(path, frontend_dir, credly_map, dry_run):
              data    = json.loads(path.read_text(encoding='utf-8'))
              creds   = data.get('credentials', [])
              auto    = frontend_dir / 'certificates' / 'auto'
              changed = 0

              for idx, c in enumerate(creds):
                  cid      = c.get('id', '')
                  ctype    = c.get('type', '')
                  old_tags = list(c.get('tags') or [])
                  new_tags = old_tags  # default: keep unchanged

                  # ── CREDLY ─────────────────────────────────────────────────────
                  if ctype == 'credly':
                      badge_id = c.get('credlyBadgeId', '') or ''
                      print(f'  [credly] {cid} — {c.get("title","")[:55]}')

                      if credly_map:
                          skills = credly_map.get(badge_id, [])
                          if skills:
                              new_tags = skills
                              print(f'    ✓ {len(new_tags)} skills from Credly live')
                          else:
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ badge not in profile — keeping {len(new_tags)} existing')
                      else:
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ profile unavailable — keeping {len(new_tags)} existing')

                  # ── CERT / LINKEDIN / CERTIFICATE: Gemini Vision ────────────────
                  else:
                      # Resolve local image path — check auto/ first, then cert_logos/
                      img_file = None
                      for ext in ['jpg', 'jpeg', 'png', 'webp']:
                          cand = auto / f'{cid}.{ext}'
                          if cand.exists():
                              img_file = cand
                              break

                      if not img_file:
                          logos = frontend_dir / 'cert_logos'
                          for ext in ['jpg', 'jpeg', 'png']:
                              cand = logos / f'{cid}_image.{ext}'
                              if cand.exists():
                                  img_file = cand
                                  break

                      print(f'  [cert]   {cid} — {c.get("title","")[:55]}')

                      if img_file:
                          print(f'    image: {img_file.name}  → asking Gemini…')
                          skills = gemini_skills(img_file)
                          if skills:
                              new_tags = skills
                              print(f'    ✓ Gemini → {new_tags}')
                          else:
                              # Gemini found nothing → keep existing, strip obvious junk
                              new_tags = [t for t in old_tags if not is_junk(t)]
                              print(f'    ⚠ Gemini returned empty — keeping {len(new_tags)} existing')
                          # Small delay to avoid hammering the API
                          time.sleep(1.0)
                      else:
                          # No local image at all — keep existing tags
                          new_tags = [t for t in old_tags if not is_junk(t)]
                          print(f'    ⚠ no local image — keeping {len(new_tags)} existing')

                  # Deduplicate preserving order
                  seen    = set()
                  deduped = []
                  for t in new_tags:
                      k = t.lower()
                      if k not in seen:
                          seen.add(k)
                          deduped.append(t)
                  new_tags = deduped

                  if new_tags != old_tags:
                      if not dry_run:
                          creds[idx]['tags'] = new_tags
                      changed += 1
                      if dry_run:
                          print(f'    [dry-run] would update: {new_tags}')

              if changed > 0 and not dry_run:
                  data['credentials'] = creds
                  path.write_text(
                      json.dumps(data, indent=2, ensure_ascii=False),
                      encoding='utf-8')
                  print(f'\n  ✅  Saved {path.name} ({changed} updated)\n')

              return changed, len(creds)

          # ── Main ──────────────────────────────────────────────────────────────────

          parser = argparse.ArgumentParser()
          parser.add_argument('--dir',     default='.')
          parser.add_argument('--dry-run', action='store_true')
          parser.add_argument('--file',    type=int, choices=[1,2,3,4], default=None)
          args = parser.parse_args()

          frontend = Path(args.dir).expanduser().resolve()
          nums     = [args.file] if args.file else [1, 2, 3, 4]

          credly_map = fetch_credly()

          total_changed = total_creds = 0
          for n in nums:
              p = frontend / f'data_creds_{n}.json'
              if not p.exists():
                  continue
              print(f'\n{"="*60}\n  data_creds_{n}.json\n{"="*60}')
              chg, cnt = process_file(p, frontend, credly_map, args.dry_run)
              total_changed += chg
              total_creds   += cnt

          print(f'\n{"="*60}')
          print(f'  Done.  Updated: {total_changed} / {total_creds}')
          if args.dry_run:
              print('  (dry-run — nothing written)')
          print(f'{"="*60}')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a') as f:
                  f.write('## Skill Sync v9 (Gemini Vision)\n')
                  f.write(f'- Credly: `{CREDLY_USERNAME}`'
                          f' — {len(credly_map)//2} badges\n')
                  f.write(f'- Updated: {total_changed}/{total_creds}\n')
                  if args.dry_run:
                      f.write('- **DRY RUN — nothing written**\n')
          PYEOF

      - name: Sync skills
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--dir frontend"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.file }}"  ]          && ARGS="$ARGS --file ${{ inputs.file }}"
          echo "Running: python sync_skills.py $ARGS"
          python sync_skills.py $ARGS

      - name: Commit updated tags
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_creds_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync credential skills via Gemini Vision [skip ci]"
            git push
          fi
