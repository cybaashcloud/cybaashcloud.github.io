# ═══════════════════════════════════════════════════════════════════════════
# CI — Validate every push and PR before it can merge
# Updated: includes SOC dashboard and tracker validation
# ═══════════════════════════════════════════════════════════════════════════
name: CI — Validate

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 1. JS syntax check ────────────────────────────────────────────
      - name: JS syntax check
        id: js_check
        run: |
          set +e
          ERRORS=0
          # Check all JS files including SOC tracker and admin security
          for f in frontend/*.js frontend/ai/*.js frontend/admin/security.js; do
            [ -f "$f" ] || continue
            node --check "$f" 2>/tmp/node_err_$(basename $f)
            if [ $? -ne 0 ]; then
              echo "❌ FAIL: $f"
              cat /tmp/node_err_$(basename $f)
              ERRORS=$((ERRORS+1))
            else
              echo "✓  $f"
            fi
          done
          echo "js_errors=$ERRORS" >> $GITHUB_OUTPUT
          [ $ERRORS -eq 0 ] && echo "✅ All JS files clean" || exit 1

      # ── 2. JSON validation ────────────────────────────────────────────
      - name: JSON validation
        id: json_check
        run: |
          set +e
          ERRORS=0
          for f in frontend/data_main.json frontend/data_creds_*.json \
                   frontend/data_ai_config.json frontend/manifest.json; do
            [ -f "$f" ] || continue
            python3 -c "import json,sys; json.load(open('$f'))" 2>/tmp/json_err
            if [ $? -ne 0 ]; then
              echo "❌ FAIL: $f — $(cat /tmp/json_err)"
              ERRORS=$((ERRORS+1))
            else
              COUNT=$(python3 -c "
          import json; d=json.load(open('$f'))
          if isinstance(d,dict) and 'credentials' in d:
              print(len(d['credentials']))
          elif isinstance(d,list): print(len(d))
          else: print('ok')
          ")
              echo "✓  $f ($COUNT)"
            fi
          done
          [ $ERRORS -eq 0 ] && echo "✅ All JSON valid" || exit 1

      # ── 3. Service worker version check ───────────────────────────────
      - name: SW version check
        run: |
          python3 - << 'PYEOF'
          import re, sys
          sw = open('frontend/sw.js').read()
          m  = re.search(r"const VERSION\s*=\s*'([^']+)'", sw)
          if not m:
              print("❌ Cannot find VERSION constant in sw.js")
              sys.exit(1)
          ver = m.group(1)
          print(f"✓  SW version: {ver}")
          PYEOF

      # ── 4. Critical files check — includes SOC files ──────────────────
      - name: Critical files check
        run: |
          MISSING=0
          for f in \
            frontend/index.html \
            frontend/recruiter.html \
            frontend/dashboard.html \
            frontend/sw.js \
            frontend/manifest.json \
            frontend/style.css \
            frontend/mobile.css \
            frontend/script.js \
            frontend/github.js \
            frontend/cybaash-ai.js \
            frontend/cybaash-ai.css \
            frontend/cybaash_chatbot.js \
            frontend/ai/index.html \
            frontend/ai/cybaash-ai_script.js \
            frontend/data_main.json \
            frontend/offline.html \
            frontend/soc-tracker-v2.js \
            frontend/admin/security.html \
            frontend/admin/security.js \
            frontend/admin/security.css; do
            if [ -f "$f" ]; then
              echo "✓  $f"
            else
              echo "❌ MISSING: $f"
              MISSING=$((MISSING+1))
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      # ── 5. SOC security checks ────────────────────────────────────────
      - name: SOC security checks
        run: |
          python3 - << 'PYEOF'
          import re, sys
          errors = 0

          # 1. Tracker must NOT contain secrets
          tracker = open('frontend/soc-tracker-v2.js').read()
          secret_patterns = [
              (r'groq\.com', 'Groq API reference'),
              (r'REPLACE_WITH', 'unreplaced placeholder'),
              (r'script\.google\.com/macros/s/[A-Za-z0-9_-]{20,}', 'hardcoded Apps Script URL'),
              (r'["\']AIza[A-Za-z0-9_-]{35}["\']', 'hardcoded Google API key'),
          ]
          for pattern, label in secret_patterns:
              if re.search(pattern, tracker):
                  print(f'❌ soc-tracker-v2.js: found {label}')
                  errors += 1
          if not errors:
              print('✓  soc-tracker-v2.js: no secrets found')

          # 2. Tracker must fetch config from Worker
          if 'workers.dev' not in tracker:
              print('❌ soc-tracker-v2.js: Worker URL missing')
              errors += 1
          else:
              print('✓  soc-tracker-v2.js: Worker URL present')

          # 3. All HTML pages must have tracker
          import re
          for page in ['frontend/index.html', 'frontend/dashboard.html',
                       'frontend/recruiter.html', 'frontend/ai/index.html']:
              try:
                  html = open(page).read()
                  if 'soc-tracker-v2.js' not in html:
                      print(f'❌ {page}: missing SOC tracker')
                      errors += 1
                  elif 'SOC_CONFIG' in html:
                      print(f'❌ {page}: SOC_CONFIG block found (secrets in HTML)')
                      errors += 1
                  else:
                      print(f'✓  {page}: tracker present, no secrets')
              except FileNotFoundError:
                  pass

          # 4. Security dashboard must be isolated
          sec_html = open('frontend/admin/security.html').read()
          if 'soc-tracker-v2.js' in sec_html:
              print('❌ security.html: tracker injected (must be isolated)')
              errors += 1
          else:
              print('✓  security.html: properly isolated')

          # 5. No Groq references anywhere in frontend
          import os
          for root, dirs, files in os.walk('frontend'):
              dirs[:] = [d for d in dirs if d != 'admin']  # skip admin dist
              for fname in files:
                  if not fname.endswith(('.html', '.js', '.css')): continue
                  fpath = os.path.join(root, fname)
                  content = open(fpath, errors='replace').read()
                  if 'groq.com' in content or 'groq_key' in content:
                      print(f'❌ {fpath}: Groq reference found')
                      errors += 1

          if errors == 0:
              print('\n✅ All SOC security checks passed')
          else:
              print(f'\n❌ {errors} SOC security check(s) failed')
              sys.exit(1)
          PYEOF

      # ── 6. HTML internal reference check ─────────────────────────────
      - name: HTML internal reference check
        run: |
          python3 - << 'PYEOF'
          import re, sys
          from pathlib import Path

          frontend = Path('frontend')
          pages    = (list(frontend.glob('*.html')) +
                      list(frontend.glob('ai/*.html')) +
                      list(frontend.glob('admin/security.html')))
          errors   = 0

          for page in pages:
              html = page.read_text(errors='replace')
              page_dir = page.parent
              refs = re.findall(r'(?:src|href)=["\'](?!https?://|//|#|data:|mailto:)([^"\']+)["\']', html)
              for ref in refs:
                  clean = ref.split('?')[0].split('#')[0]
                  if not clean or clean.startswith('{{'): continue
                  if clean.startswith('/'):
                      target = (frontend / clean.lstrip('/')).resolve()
                  else:
                      target = (page_dir / clean).resolve()
                  if not target.exists():
                      if any(x in clean for x in ['portfolio/', '/ai/', '/icons/', 'avatar', 'data_creds']):
                          continue
                      print(f"⚠  {page.name}: missing ref → {clean}")
                      if clean.endswith(('.js', '.css')):
                          errors += 1

          if errors:
              print(f"\n❌ {errors} broken JS/CSS reference(s)")
              sys.exit(1)
          else:
              print(f"\n✅ HTML references OK ({len(pages)} pages checked)")
          PYEOF

      # ── 7. Cert data integrity ────────────────────────────────────────
      - name: Cert data integrity
        run: |
          python3 - << 'PYEOF'
          import json
          from pathlib import Path

          total = 0
          for n in range(1, 6):
              p = Path(f'frontend/data_creds_{n}.json')
              if not p.exists(): continue
              d = json.loads(p.read_text())
              creds = d.get('credentials', [])
              total += len(creds)
              broken = [c['id'] for c in creds if not c.get('id') or not c.get('title')]
              if broken:
                  print(f"⚠  data_creds_{n}.json: {len(broken)} entries missing id/title")
              print(f"✓  data_creds_{n}.json: {len(creds)} credentials")

          print(f"\n✅ Total credentials: {total}")
          PYEOF

      # ── 8. Post summary ───────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## CI Results — \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| JS Syntax | ${{ steps.js_check.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Validation | ${{ steps.json_check.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Files | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| SOC Security | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit: \`${{ github.sha }}\` | [View](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
