name: Build AI Response Cache

# Replaces the old "Deploy to Render" workflow.
# Render is not used — backend is fully serverless (Gemini + GitHub).
#
# What this does:
#   1. Reads all cert tags from data_creds_*.json to know the portfolio's topics
#   2. Uses Gemini to pre-generate answers for ~60 common cybersecurity questions
#      tailored to those topics
#   3. Saves the cache to frontend/data_ai_cache.json and commits it
#
# Result: cybaash-ai.js serves cached answers instantly (zero API calls).
# Only genuine new questions hit Gemini live → 429 errors drop to near zero.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/data_creds_*.json'   # rebuild when cert topics change
      - 'frontend/data_ai_config.json' # rebuild when system prompt changes
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Regenerate all entries even if cache exists'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 4 * * 1'   # Every Monday 04:00 UTC — keep cache fresh

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build cache script
        run: |
          cat > build_cache.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          build_cache.py
          ══════════════
          Pre-generates Gemini answers for common questions and saves them to
          frontend/data_ai_cache.json.

          The frontend loads this file on startup.  For each user message it
          computes a Jaccard similarity score against every cache entry's keyword
          set.  If the best score exceeds the threshold the cached answer is
          returned instantly — no API call, no 429, no latency.

          Cache entry format:
            {
              "k": ["sql", "injection", "sqli", "database"],   // match keywords
              "a": "## SQL Injection\n\n..."                   // pre-built answer
            }
          """

          import json, os, re, time
          from pathlib import Path

          import requests

          GEMINI_API_KEY = os.environ.get("GEMINI_API_KEY", "")
          GEMINI_MODEL   = "gemini-2.5-flash-lite"
          GEMINI_URL     = (
              f"https://generativelanguage.googleapis.com/v1beta/models/"
              f"{GEMINI_MODEL}:generateContent?key={GEMINI_API_KEY}"
          )
          DELAY          = 4.0   # seconds between Gemini calls (avoid 429 in the workflow)
          MAX_TOKENS     = 600   # keep answers concise — they're cached responses

          SYSTEM_PROMPT = (
              "You are CyberBot — an expert cybersecurity assistant. "
              "Answer in markdown. Be concise and direct (under 400 words). "
              "Structure: what it is → how it works → how to defend. "
              "Use code blocks where relevant. No fluff."
          )

          # ── Static question bank (covers Mohamed's cert topics) ─────────────────
          # Format: (display_question, [match_keywords])
          QUESTIONS = [
              # Cyber fundamentals
              ("What is SQL injection and how do you prevent it?",
               ["sql","injection","sqli","database","query","parameterized"]),
              ("What is XSS (Cross-Site Scripting) and how do you fix it?",
               ["xss","cross site scripting","cross-site","html injection","dom"]),
              ("What is CSRF and how do you defend against it?",
               ["csrf","cross site request forgery","cross-site request","samesite"]),
              ("What is a buffer overflow attack?",
               ["buffer overflow","bof","stack overflow","memory corruption","heap"]),
              ("Explain SSRF (Server-Side Request Forgery)",
               ["ssrf","server side request forgery","internal network","metadata"]),
              ("What is XXE injection?",
               ["xxe","xml external entity","xml injection","entity"]),
              ("What is IDOR (Insecure Direct Object Reference)?",
               ["idor","insecure direct object","broken access control","authorization"]),
              ("What is a Man-in-the-Middle (MITM) attack?",
               ["mitm","man in the middle","man-in-the-middle","intercept","arp spoofing"]),
              ("What is a DDoS attack and how do you mitigate it?",
               ["ddos","distributed denial","dos","denial of service","flood"]),
              ("Explain the OWASP Top 10",
               ["owasp","top 10","owasp top","web vulnerabilities","a01","a03"]),

              # Ethical hacking / pentest
              ("What are the phases of a penetration test?",
               ["pentest","penetration test","pen test","phases","recon","exploitation"]),
              ("What is ethical hacking?",
               ["ethical hacking","ethical hacker","white hat","authorized","bug bounty"]),
              ("What is threat modeling?",
               ["threat modeling","stride","dread","threat model","attack surface"]),
              ("What is a CVE and how does CVSS scoring work?",
               ["cve","cvss","vulnerability scoring","common vulnerability","national vulnerability"]),
              ("What tools are used in penetration testing?",
               ["nmap","metasploit","burp suite","wireshark","kali","pentest tools"]),

              # Network security
              ("What is network segmentation and why does it matter?",
               ["network segmentation","vlan","dmz","microsegmentation","firewall zones"]),
              ("Explain TLS/SSL and how HTTPS works",
               ["tls","ssl","https","certificate","handshake","encryption","pki"]),
              ("What is a firewall and what are its types?",
               ["firewall","packet filter","stateful","next-gen","ngfw","waf"]),
              ("What is DNS and how is it attacked?",
               ["dns","domain name","dns spoofing","dns poisoning","dns hijack"]),
              ("What is VPN and how does it work?",
               ["vpn","virtual private network","tunnel","openvpn","ipsec","wireguard"]),

              # Cloud security
              ("What is cloud security and the shared responsibility model?",
               ["cloud security","shared responsibility","aws security","azure security","gcp"]),
              ("What is AWS IAM and how do you secure it?",
               ["iam","identity access management","aws iam","roles","policies","least privilege"]),
              ("What is AWS GuardDuty?",
               ["guardduty","aws guardduty","threat detection","aws threat","anomaly detection"]),
              ("What is CSPM (Cloud Security Posture Management)?",
               ["cspm","cloud security posture","security hub","aws security hub","misconfiguration"]),
              ("What is AWS CloudTrail and why is it important?",
               ["cloudtrail","aws cloudtrail","audit log","api calls","logging aws"]),

              # Cryptography & passwords
              ("How should passwords be stored securely?",
               ["password","hash","bcrypt","argon2","scrypt","salting","pbkdf2"]),
              ("What is public key cryptography?",
               ["public key","private key","asymmetric","rsa","ecc","cryptography","pki"]),
              ("What is AES encryption?",
               ["aes","symmetric encryption","aes-256","block cipher","encryption key"]),
              ("What are JSON Web Tokens (JWT)?",
               ["jwt","json web token","token","bearer","claims","signature"]),

              # Secure coding
              ("What is input validation and output encoding?",
               ["input validation","output encoding","sanitization","escaping","whitelist"]),
              ("What are secure coding best practices?",
               ["secure coding","owasp secure","code review","static analysis","sast"]),
              ("What is the principle of least privilege?",
               ["least privilege","principle of least","zero trust","minimum access"]),
              ("What is DevSecOps?",
               ["devsecops","security pipeline","shift left","sast","dast","ci cd security"]),
              ("How do you scan code for vulnerabilities?",
               ["code scan","code analysis","sast","semgrep","sonarqube","snyk","security lint"]),

              # AI & cybersecurity
              ("How is AI used in cybersecurity?",
               ["ai security","machine learning security","ai cybersecurity","ml detection","ai threat"]),
              ("What are adversarial attacks on AI models?",
               ["adversarial","adversarial attack","model poisoning","evasion attack","ai attack"]),
              ("What are the risks of LLMs (Large Language Models)?",
               ["llm","large language model","prompt injection","llm security","chatgpt security"]),

              # Linux & sysadmin
              ("Linux security hardening basics",
               ["linux","linux security","hardening","sudo","permissions","ufw","linux admin"]),
              ("What are Linux file permissions?",
               ["chmod","chown","linux permissions","rwx","file permission","setuid"]),
              ("What is SELinux / AppArmor?",
               ["selinux","apparmor","mandatory access control","mac","linux security module"]),

              # Malware & threats
              ("What is ransomware and how does it work?",
               ["ransomware","ransom","encrypt files","ransomware attack","raas"]),
              ("What is a Trojan horse in cybersecurity?",
               ["trojan","trojan horse","malware","backdoor","rat","remote access trojan"]),
              ("What is social engineering?",
               ["social engineering","phishing","pretexting","vishing","spear phishing"]),
              ("What is a zero-day vulnerability?",
               ["zero day","zero-day","0day","unpatched","unknown vulnerability"]),
              ("What is threat hunting?",
               ["threat hunting","proactive","ioc","indicators of compromise","hunting"]),

              # Incident response
              ("What are the phases of incident response?",
               ["incident response","ir phases","preparation","containment","eradication","recovery"]),
              ("What is digital forensics?",
               ["forensics","digital forensics","evidence","chain of custody","dfir"]),
              ("What is SIEM and how does it work?",
               ["siem","security information","splunk","elastic","log management","alerts"]),

              # Compliance & governance
              ("What is the CIA triad?",
               ["cia triad","confidentiality","integrity","availability","cia"]),
              ("What is GDPR?",
               ["gdpr","data protection","privacy","personal data","regulation"]),
              ("What is ISO 27001?",
               ["iso 27001","isms","information security management","iso27001"]),
              ("What is a security audit?",
               ["security audit","audit","compliance","assessment","security review"]),

              # Career & skills
              ("How do I start a career in cybersecurity?",
               ["career","cybersecurity career","get started","certifications","roadmap","entry level"]),
              ("What certifications are recommended for cybersecurity?",
               ["certifications","cissp","ceh","security+","oscp","comptia","cert path"]),
          ]

          # ── Gemini caller ───────────────────────────────────────────────────────

          def call_gemini(question: str) -> str:
              payload = {
                  "system_instruction": {"parts": [{"text": SYSTEM_PROMPT}]},
                  "contents": [{"role": "user", "parts": [{"text": question}]}],
                  "generationConfig": {
                      "temperature": 0.3,
                      "maxOutputTokens": MAX_TOKENS,
                      "topP": 0.9,
                  },
                  "safetySettings": [
                      {"category": "HARM_CATEGORY_HARASSMENT",        "threshold": "BLOCK_ONLY_HIGH"},
                      {"category": "HARM_CATEGORY_HATE_SPEECH",       "threshold": "BLOCK_ONLY_HIGH"},
                      {"category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_ONLY_HIGH"},
                      {"category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_ONLY_HIGH"},
                  ],
              }
              for attempt in range(4):
                  try:
                      r = requests.post(GEMINI_URL, json=payload, timeout=30)
                      if r.status_code == 429:
                          wait = 60 * (attempt + 1)
                          print(f"    429 — waiting {wait}s (attempt {attempt+1})")
                          time.sleep(wait)
                          continue
                      if r.status_code != 200:
                          print(f"    HTTP {r.status_code}: {r.text[:200]}")
                          return ""
                      data = r.json()
                      return data["candidates"][0]["content"]["parts"][0]["text"].strip()
                  except Exception as e:
                      print(f"    error: {e}")
                      time.sleep(10)
              return ""

          # ── Load existing cache (to skip already-generated entries) ─────────────

          cache_path = Path("frontend/data_ai_cache.json")
          existing   = {}
          if cache_path.exists():
              try:
                  old = json.loads(cache_path.read_text(encoding="utf-8"))
                  for entry in old.get("entries", []):
                      # Key by first keyword
                      if entry.get("k"):
                          existing[entry["k"][0]] = entry
                  print(f"Loaded {len(existing)} existing cache entries")
              except Exception as e:
                  print(f"Could not load existing cache: {e}")

          force = os.environ.get("FORCE_REBUILD", "").lower() in ("1","true","yes")

          # ── Generate entries ────────────────────────────────────────────────────

          entries = []
          skipped = generated = failed = 0

          for i, (question, keywords) in enumerate(QUESTIONS):
              anchor = keywords[0]
              print(f"\n[{i+1}/{len(QUESTIONS)}] {question[:65]}")

              # Skip if already cached and not force-rebuilding
              if not force and anchor in existing:
                  entries.append(existing[anchor])
                  skipped += 1
                  print(f"  ✓ cached (skip)")
                  continue

              if not GEMINI_API_KEY:
                  print(f"  ✗ no GEMINI_API_KEY — skipping")
                  failed += 1
                  continue

              answer = call_gemini(question)
              if answer:
                  entries.append({"k": keywords, "a": answer})
                  generated += 1
                  print(f"  ✓ generated ({len(answer)} chars)")
              else:
                  # Keep old entry if we had one
                  if anchor in existing:
                      entries.append(existing[anchor])
                      print(f"  ⚠ generation failed — keeping old")
                  else:
                      failed += 1
                      print(f"  ✗ skipped (no answer)")

              time.sleep(DELAY)

          # ── Write cache file ────────────────────────────────────────────────────

          cache_path.parent.mkdir(parents=True, exist_ok=True)
          cache_path.write_text(
              json.dumps({
                  "v":       2,
                  "model":   GEMINI_MODEL,
                  "built":   __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "total":   len(entries),
                  "entries": entries,
              }, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          print(f"\n{'='*60}")
          print(f"  Done.  Generated={generated}  Skipped={skipped}  Failed={failed}")
          print(f"  Cache: {len(entries)} entries → {cache_path}")
          print(f"{'='*60}")

          # GitHub Actions summary
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as f:
                  f.write("## AI Cache Build\n")
                  f.write(f"- **Total entries:** {len(entries)}\n")
                  f.write(f"- **Generated this run:** {generated}\n")
                  f.write(f"- **Skipped (already cached):** {skipped}\n")
                  f.write(f"- **Failed:** {failed}\n")
                  f.write(f"- **Model:** `{GEMINI_MODEL}`\n")
          PYEOF

      - name: Build AI cache
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_REBUILD:  ${{ inputs.force_rebuild && 'true' || 'false' }}
        run: python build_cache.py

      - name: Commit cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data_ai_cache.json
          if git diff --cached --quiet; then
            echo "Cache unchanged — nothing to commit."
          else
            COUNT=$(python3 -c "import json; d=json.load(open('frontend/data_ai_cache.json')); print(d['total'])")
            git commit -m "chore: rebuild AI response cache (${COUNT} entries) [skip ci]"
            git push
            echo "Pushed updated cache."
          fi
