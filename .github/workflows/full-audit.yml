      - name: 'C21 · Hardcoded Secrets Scan'
        id: c21
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base = Path('frontend')
          PATTERNS = [
              (r'AIza[0-9A-Za-z\-_]{35}',                                   'Google API Key'),
              (r'sk-[A-Za-z0-9]{40,}',                                       'OpenAI Key'),
              (r'(?i)api[_-]?key\s*[=:]\s*["\']([A-Za-z0-9_\-]{20,})["\']', 'Generic API Key'),
              (r'(?i)(password|passwd)\s*[=:]\s*["\'](?!.*\{)([^"\']{8,})["\']', 'Hardcoded Password'),
              (r'eyJ[A-Za-z0-9_\-]{30,}',                                    'JWT Token'),
              (r'ghp_[A-Za-z0-9]{36}',                                       'GitHub PAT'),
              (r'(?i)private[_-]?key\s*[=:]\s*["\']([^"\']{20,})["\']',     'Private Key'),
          ]
          # Values that are obviously placeholders / examples — not real secrets
          SAFE_VALUES = {'YOUR_KEY','your-key','INSERT','PLACEHOLDER','example','demo','test','xxx','yyy'}

          errors = []
          for f in list(base.glob('**/*.js')) + list(base.glob('**/*.html')) + list(base.glob('**/*.json')):
              if any(s in str(f) for s in ['dist/assets','node_modules']): continue
              src = f.read_text(errors='replace')
              for pat, label in PATTERNS:
                  for m in re.finditer(pat, src, re.I):
                      val = m.group(0)[:40]
                      if not any(sv.lower() in val.lower() for sv in SAFE_VALUES):
                          ln = src[:m.start()].count('\n') + 1
                          errors.append(f"{f.relative_to(base)} L{ln}: [{label}] {val}")

          for e in errors: print(f"  ❌  {e}")
          if not errors:   print("  ✅  No hardcoded secrets detected")
          open('c21.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat c21.txt)" >> $GITHUB_OUTPUT

      - name: 'C22 · Dangerous JS Patterns'
        id: c22
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base = Path('frontend')
          PATTERNS = [
              (r'\beval\s*\(',                          'eval()',              'HIGH'),
              (r'\bnew\s+Function\s*\(',                'new Function()',      'HIGH'),
              (r'setTimeout\s*\(\s*["\`]',              'setTimeout(string)', 'MED'),
              (r'setInterval\s*\(\s*["\`]',             'setInterval(string)','MED'),
              (r'document\.write\s*\(',                 'document.write()',   'MED'),
              (r'innerHTML\s*\+?=(?!=)',                'innerHTML=',         'LOW'),
              (r'outerHTML\s*\+?=(?!=)',                'outerHTML=',         'LOW'),
              (r'insertAdjacentHTML\s*\(',              'insertAdjacentHTML', 'LOW'),
          ]
          # Files where these are expected (template engine, simulator)
          EXEMPT_FILES = {'index.html'}  # simulation output uses innerHTML intentionally

          by_severity = {'HIGH':[], 'MED':[], 'LOW':[]}
          for f in sorted(list(base.glob('*.js')) + list(base.glob('ai/*.js')) + list(base.glob('admin/*.js'))):
              if f.name in EXEMPT_FILES or 'dist/assets' in str(f): continue
              src   = f.read_text(errors='replace')
