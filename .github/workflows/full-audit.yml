      - name: 'D29 · Accessibility Audit'
        id: d29
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base  = Path('frontend')
          total = 0
          for f in sorted(list(base.glob('*.html')) + list(base.glob('ai/*.html'))):
              html = f.read_text(errors='replace')
              issues = []
              # img without alt
              imgs = re.findall(r'<img(?![^>]*\balt=)[^>]*/?>',  html, re.I|re.S)
              if imgs: issues.append(f"{len(imgs)} <img> without alt")
              # button without accessible label
              btns = re.findall(r'<button(?![^>]*(?:aria-label|title))[^>]*>\s*[<&]', html, re.I)
              if btns: issues.append(f"{len(btns)} <button> without aria-label/title")
              # input without label association
              inputs = re.findall(r'<input(?![^>]*(?:aria-label|aria-labelledby|id=))[^>]*/?>',  html, re.I)
              inputs = [i for i in inputs if 'type="hidden"' not in i.lower() and 'type=hidden' not in i.lower()]
              if inputs: issues.append(f"{len(inputs)} <input> without label")
              # links with no text
              empty_links = re.findall(r'<a[^>]*>\s*</a>', html, re.I)
              if empty_links: issues.append(f"{len(empty_links)} empty <a> links")

              if issues:
                  total += sum(int(re.search(r'\d+',i).group()) for i in issues)
                  print(f"  ⚠   {f.name}:")
                  for i in issues: print(f"       {i}")
              else:
                  print(f"  ✅  {f.name}")
          open('d29.txt','w').write(str(total))
          PYEOF
          echo "count=$(cat d29.txt)" >> $GITHUB_OUTPUT

