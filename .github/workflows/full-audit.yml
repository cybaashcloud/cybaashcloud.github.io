          import re
          from pathlib import Path
          from collections import defaultdict

          base    = Path('frontend')
          TAGS    = ['FIXME','BUG','HACK','XXX','TODO','NOSONAR']
          pattern = re.compile(r'\b(' + '|'.join(TAGS) + r')\b[:\s]*(.*)')
          by_tag  = defaultdict(list)

          for path in sorted(list(base.glob('*.js')) + list(base.glob('*.css')) +
                              list(base.glob('ai/*.js')) + list(base.glob('admin/*.js')) +
