              defined  = set(re.findall(r'--([a-zA-Z][\w-]+)\s*:', css))
              used     = set(re.findall(r'var\(--([a-zA-Z][\w-]+)', css))
              all_defined = defined | global_vars
              undef    = sorted(used - all_defined)
              rel      = str(css_path.relative_to(base))
              if undef:
                  total += len(undef)
                  print(f"  ⚠   {rel}: {len(undef)} undefined var(s): {undef[:8]}")
