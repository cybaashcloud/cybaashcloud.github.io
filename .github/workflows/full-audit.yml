                  if hits:
                      by_severity[sev].append((f.name, label, hits))

          total = 0
          for sev, icon in [('HIGH','❌'),('MED','⚠ '),('LOW','ℹ ')]:
              for fname, label, hits in by_severity[sev]:
                  total += len(hits)
                  print(f"  {icon}  [{sev}] {fname} — {label} x{len(hits)}")
                  for ln, text in hits[:3]: print(f"       L{ln:<5} {text}")
