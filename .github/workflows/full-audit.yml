            ('B20','Long Unminified Lines',         r('b20.txt'), False),
            # Block C — Security & Quality
            ('C21','Hardcoded Secrets',             r('c21.txt'), True),
            ('C22','Dangerous JS Patterns',         r('c22.txt'), False),
            ('C23','Missing Async Error Handling',  r('c23.txt'), False),
            ('C24','Event Listener Leak Risk',      r('c24.txt'), False),
            ('C25','Unjustified Write Permissions', r('c25.txt'), False),
            ('C26','Unpinned Dependencies',         r('c26.txt'), False),
            ('C27','Gitleaks Config Issues',        r('c27.txt'), True),
            # Block D — SEO & Accessibility
            ('D28','Missing Meta Tags',             r('d28.txt'), False),
            ('D29','Accessibility Issues',          r('d29.txt'), False),
            ('D30','Missing Font Preconnect',       r('d30.txt'), False),
            ('D31','Manifest Issues',               r('d31.txt'), False),
            ('D32','Undefined CSS Variables',       r('d32.txt'), False),
            ('D33','File Size Budget Exceeded',     r('d33.txt'), True),
          ]

          hard_errors = [(id,l,c) for id,l,c,h in results if h and c > 0]
          warnings    = [(id,l,c) for id,l,c,h in results if not h and c > 0]
          clean       = [(id,l,c) for id,l,c,h in results if c == 0]

          lines = []
          lines.append("# 🔍 CYBAASH Full Codebase Audit")
          lines.append("")
          lines.append(f"> **Commit:** `{os.environ.get('GITHUB_SHA','local')[:8]}`")
          lines.append(f"> **Branch:** `{os.environ.get('GITHUB_REF_NAME','local')}`")
          lines.append("")

          if hard_errors:
              lines.append("## ❌ Block A+C · Hard Errors (must fix before merge)")
              lines.append("| ID | Check | Issues |")
              lines.append("|----|-------|--------|")
              for id,l,c in hard_errors:
                  lines.append(f"| `{id}` | {l} | **{c}** |")
              lines.append("")

          if warnings:
              lines.append("## ⚠️ Block B+C+D · Warnings (should clean up)")
              lines.append("| ID | Check | Issues |")
              lines.append("|----|-------|--------|")
              for id,l,c in warnings:
                  lines.append(f"| `{id}` | {l} | {c} |")
              lines.append("")

          lines.append(f"## ✅ Clean ({len(clean)}/{len(results)} checks)")
          lines.append("| ID | Check |")
          lines.append("|----|-------|")
          for id,l,_ in clean:
              lines.append(f"| `{id}` | {l} |")
          lines.append("")

          total_hard = sum(c for _,_,c,h in results if h)
          total_warn = sum(c for _,_,c,h in results if not h)
          grade = "A+" if total_hard==0 and total_warn==0 else \
                  "A"  if total_hard==0 and total_warn<10  else \
                  "B"  if total_hard==0 and total_warn<30  else \
                  "C"  if total_hard==0 else "F"
          lines.append(f"---")
          lines.append(f"**Grade: {grade}** | Hard errors: {total_hard} | Warnings: {total_warn} | Checks: {len(results)}")

          report = '\n'.join(lines)
          print(report)

          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(report)

          fail_on_warn = os.environ.get('INPUT_FAIL_ON_WARNINGS','false').lower() == 'true'
          if total_hard > 0:
              print(f"\n❌ Failing: {total_hard} hard error(s) found")
              exit(1)
          elif fail_on_warn and total_warn > 0:
              print(f"\n❌ Failing: {total_warn} warning(s) found (fail_on_warnings=true)")
              exit(1)
          elif total_hard > 0 or total_warn > 0:
              print(f"\n⚠  Audit complete — {total_hard} error(s), {total_warn} warning(s)")
          else:
              print(f"\n✅ Perfect score — codebase is clean")
          PYEOF
        env:
          INPUT_FAIL_ON_WARNINGS: ${{ inputs.fail_on_warnings || 'false' }}

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rd = f => { try { return parseInt(fs.readFileSync(f,'utf8').trim()||'0'); } catch { return 0; } };

            const res = [
              ['A01','JS Syntax Errors',rd('a01.txt'),true],
              ['A02','Broken HTML References',rd('a02.txt'),true],
              ['A03','Broken Python Scripts',rd('a03.txt'),true],
              ['A04','Broken SW Cache',rd('a04.txt'),true],
              ['A05','Empty Files',rd('a05.txt'),true],
              ['A06','Circular Imports',rd('a06.txt'),true],
              ['A07','Mixed HTTP/HTTPS',rd('a07.txt'),true],
              ['A08','Broken Anchors',rd('a08.txt'),true],
              ['A09','Broken JSON',rd('a09.txt'),true],
              ['A10','Blocking Scripts',rd('a10.txt'),true],
              ['B11','Unused JS',rd('b11.txt'),false],
              ['B12','Unused CSS',rd('b12.txt'),false],
              ['B13','Unused Classes',rd('b13.txt'),false],
              ['B14','Dead Functions',rd('b14.txt'),false],
              ['B15','Dead JSON Keys',rd('b15.txt'),false],
              ['B16','Orphan Assets',rd('b16.txt'),false],
              ['B17','Duplicate CSS',rd('b17.txt'),false],
              ['B18','Console Leaks',rd('b18.txt'),false],
              ['B19','TODO/FIXME',rd('b19.txt'),false],
              ['B20','Long Lines',rd('b20.txt'),false],
              ['C21','Hardcoded Secrets',rd('c21.txt'),true],
              ['C22','Dangerous JS',rd('c22.txt'),false],
              ['C23','No Error Handling',rd('c23.txt'),false],
              ['C24','Listener Leaks',rd('c24.txt'),false],
              ['C25','Write Permissions',rd('c25.txt'),false],
              ['C26','Unpinned Deps',rd('c26.txt'),false],
              ['C27','Gitleaks Config',rd('c27.txt'),true],
              ['D28','Missing Meta',rd('d28.txt'),false],
              ['D29','Accessibility',rd('d29.txt'),false],
              ['D30','Font Preconnect',rd('d30.txt'),false],
              ['D31','Manifest Issues',rd('d31.txt'),false],
              ['D32','Undefined CSS Vars',rd('d32.txt'),false],
              ['D33','Size Budget',rd('d33.txt'),true],
            ];

            const hard = res.filter(([,,c,h]) => h && c > 0);
            const warn = res.filter(([,,c,h]) => !h && c > 0);
            const ok   = res.filter(([,,c]) => c === 0).length;
            const grade = hard.length===0 && warn.length===0 ? 'A+' :
                          hard.length===0 && warn.length<10  ? 'A'  :
                          hard.length===0 && warn.length<30  ? 'B'  :
                          hard.length===0                    ? 'C'  : 'F';

            let body = `## 🔍 Full Codebase Audit — Grade: **${grade}**\n\n`;
            if (hard.length) {
              body += `### ❌ Hard Errors\n| ID | Check | # |\n|---|---|---|\n`;
              hard.forEach(([id,l,c]) => body += `| \`${id}\` | ${l} | **${c}** |\n`);
              body += '\n';
            }
            if (warn.length) {
              body += `### ⚠️ Warnings\n| ID | Check | # |\n|---|---|---|\n`;
              warn.forEach(([id,l,c]) => body += `| \`${id}\` | ${l} | ${c} |\n`);
              body += '\n';
            }
            body += `### ✅ ${ok}/${res.length} checks passed\n`;
            body += `\n_[Full details →](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body
            });
