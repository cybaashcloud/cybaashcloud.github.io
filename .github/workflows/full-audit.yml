          import re
          from pathlib import Path

          base  = Path('frontend')
          # Read style.css as the global variable source
          global_vars = set()
          for css_path in [base/'style.css', base/'cybaash-ai.css']:
              if css_path.exists():
                  global_vars |= set(re.findall(r'--([a-zA-Z][\w-]+)\s*:', css_path.read_text()))

