# ═══════════════════════════════════════════════════════════════════════════
# CYBAASH — Full Codebase Audit  v2.0  (God Level)
# ───────────────────────────────────────────────────────────────────────────
#  BLOCK A  — Broken Code (hard failures)
#    1   JS syntax errors            node --check every .js/.jsx
#    2   Broken HTML references      <script>/<link>/<img> → missing files
#    3   Broken Python scripts       py_compile all .py
#    4   Broken SW cache entries     SHELL_FILES vs actual disk
#    5   Empty files                 zero-byte / whitespace-only
#    6   Circular imports            ES module cycles in admin/src
#    7   Mixed HTTP/HTTPS content    http:// in production assets
#    8   Broken anchor links         href="#id" with no matching id=""
#    9   Broken JSON                 malformed data_*.json / manifest.json
#   10   Script load blocking        render-blocking <script> without defer/async
#
#  BLOCK B  — Dead Code (warnings)
#   11   Unused JS files             .js never <script src>'d or imported
#   12   Unused CSS files            .css never <link href>'d
#   13   Unused CSS classes          classes defined, never used in HTML/JS
#   14   Dead JS functions           declared, never called cross-file
#   15   Dead JSON keys              config keys never read in JS/HTML
#   16   Orphan assets               images/icons referenced nowhere
#   17   Duplicate CSS rules         same selector defined 2+ times
#   18   Console.log leaks           debug logs left in production JS
#   19   TODO / FIXME tracker        every TODO/FIXME/HACK/BUG/XXX mapped
#   20   Long lines (unminified)     lines > 300 chars in non-minified JS
#
#  BLOCK C  — Security & Quality
#   21   Hardcoded secrets scan      API keys, tokens, passwords in source
#   22   Dangerous JS patterns       eval(), innerHTML, new Function(), etc.
#   23   Missing error handling      async functions with no try/catch
#   24   Event listener leaks        addEventListener with no removeEventListener
#   25   Workflow permissions audit  write permissions audit on all workflows
#   26   Dependency version pinning  unpinned ^/~ versions in package.json
#   27   Gitleaks config health      .gitleaks.toml rules check
#
#  BLOCK D  — SEO & Accessibility
#   28   Missing meta tags           og:title / og:image / description
#   29   Accessibility audit         img alt, button aria-label, input labels
#   30   Font preconnect             Google Fonts without <link rel=preconnect>
#   31   PWA manifest completeness   required manifest.json fields
#   32   Undefined CSS variables     var(--x) used but --x never defined
#   33   File size budget            each core asset vs KB limit
#
# Outputs:  GitHub Actions job summary · PR comment · exit 1 on hard errors
# Triggers: workflow_dispatch · push to main (frontend/**) · weekly Monday
# ═══════════════════════════════════════════════════════════════════════════

name: Full Codebase Audit

on:
  workflow_dispatch:
    inputs:
      fail_on_warnings:
        description: 'Also fail on warnings (not just hard errors)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/full-audit.yml'
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: full-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Full Codebase Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml --break-system-packages -q

      # ══════════════════════════════════════════════════════════════════════
      # BLOCK A — BROKEN CODE
      # ══════════════════════════════════════════════════════════════════════

      - name: 'A01 · JS Syntax Errors'
        id: a01
        run: |
          python3 - <<'PYEOF'
          import subprocess, json
          from pathlib import Path

          base = Path('frontend')
          files = (
              list(base.glob('*.js')) + list(base.glob('ai/*.js')) +
              list(base.glob('admin/*.js')) + list(base.glob('admin/src/**/*.js')) +
              list(base.glob('admin/src/**/*.jsx'))
          )
          files = [f for f in files if 'dist/assets' not in str(f)]

          errors, ok = [], []
          for f in sorted(files):
              r = subprocess.run(['node', '--check', str(f)], capture_output=True, text=True)
              if r.returncode != 0:
                  errors.append({'file': str(f), 'error': r.stderr.strip().splitlines()[0]})
              else:
                  ok.append(str(f))

          for e in errors:
              print(f"  ❌  {e['file']}\n      {e['error']}")
          for f in ok:
              print(f"  ✓   {f}")
          print(f"\n  {'❌' if errors else '✅'}  {len(errors)} error(s) in {len(files)} JS files")
          open('a01.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a01.txt)" >> $GITHUB_OUTPUT

      - name: 'A02 · Broken HTML References'
        id: a02
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base = Path('frontend')
          pages = list(base.glob('*.html')) + list(base.glob('ai/*.html')) + list(base.glob('admin/*.html'))
          errors = []

          for page in sorted(pages):
              html = re.sub(r'<!--.*?-->', '', page.read_text(errors='replace'), flags=re.DOTALL)
              src_dir = page.parent
              for ref in re.findall(r'(?:src|href|action)=["\'](?!https?://|//|#|data:|mailto:|javascript:)([^"\'?#\s]+)', html):
                  candidate = (base / ref.lstrip('/')) if ref.startswith('/') else (src_dir / ref)
                  try:
                      candidate.resolve().relative_to(base.resolve())
                  except ValueError:
                      continue
                  if not candidate.resolve().exists():
                      errors.append(f"{page.name} → {ref}")

          for e in errors:
              print(f"  ❌  {e}")
          if not errors:
              print(f"  ✅  No broken HTML references")
          open('a02.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a02.txt)" >> $GITHUB_OUTPUT

      - name: 'A03 · Broken Python Scripts'
        id: a03
        run: |
          python3 - <<'PYEOF'
          import py_compile
          from pathlib import Path

          files = (
              list(Path('frontend').glob('**/*.py')) +
              list(Path('scripts').glob('**/*.py')) +
              list(Path('.github').glob('**/*.py')) +
              [Path('verify_data.py')]
          )
          errors = []
          for f in sorted(set(files)):
              if not f.exists(): continue
              try:
                  py_compile.compile(str(f), doraise=True)
                  print(f"  ✓   {f}")
              except py_compile.PyCompileError as e:
                  errors.append(f"{f}: {e}")
                  print(f"  ❌  {f}\n      {e}")
          if not errors:
              print("  ✅  All Python scripts compile")
          open('a03.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a03.txt)" >> $GITHUB_OUTPUT

      - name: 'A04 · Broken SW Cache Entries'
        id: a04
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          sw   = Path('frontend/sw.js').read_text()
          base = Path('frontend')
          m    = re.search(r'const SHELL_FILES\s*=\s*\[([^\]]+)\]', sw, re.DOTALL)
          if not m:
              print("  ⚠  Cannot parse SHELL_FILES")
              open('a04.txt','w').write('0')
              exit(0)

          entries = re.findall(r"'(/[^']+)'", m.group(1))
          errors, ok = [], []
          for e in entries:
              p = base / e.lstrip('/')
              (ok if p.exists() else errors).append(e)

          for e in errors: print(f"  ❌  sw.js lists {e} — file missing")
          for e in ok:     print(f"  ✓   {e}")
          print(f"\n  {'❌' if errors else '✅'}  {len(errors)} broken / {len(ok)} OK")
          open('a04.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a04.txt)" >> $GITHUB_OUTPUT

      - name: 'A05 · Empty Files'
        id: a05
        run: |
          python3 - <<'PYEOF'
          from pathlib import Path

          SKIP = {'node_modules','.git','dist','certificates/auto','certificates/aws','cert_logos'}
          TEXT_EXT = {'.html','.css','.js','.jsx','.py','.json','.yml','.yaml','.md','.txt','.sh'}
          empties = []
          for d in [Path('frontend'), Path('scripts'), Path('.github')]:
              for f in d.rglob('*'):
                  if not f.is_file() or f.suffix not in TEXT_EXT: continue
                  if any(s in str(f) for s in SKIP): continue
                  if not f.read_text(errors='replace').strip():
                      empties.append(str(f))

          for e in empties: print(f"  ❌  {e}")
          if not empties:   print("  ✅  No empty files")
          open('a05.txt','w').write(str(len(empties)))
          PYEOF
          echo "count=$(cat a05.txt)" >> $GITHUB_OUTPUT

      - name: 'A06 · Circular Imports (admin/src)'
        id: a06
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path
          from collections import defaultdict

          src_dir = Path('frontend/admin/src')
          if not src_dir.exists():
              print("  ℹ   admin/src not present — skipped")
              open('a06.txt','w').write('0')
              exit(0)

          graph = defaultdict(set)
          for f in list(src_dir.rglob('*.js')) + list(src_dir.rglob('*.jsx')):
              stem = f.stem
              for imp in re.findall(r"""(?:import|from)\s+['"]([^'"]+)['"]""", f.read_text(errors='replace')):
                  if imp.startswith('.'):
                      graph[stem].add(imp.split('/')[-1].replace('.js','').replace('.jsx',''))

          def has_cycle(node, visited, stack):
              visited.add(node); stack.add(node)
              for nb in graph.get(node, []):
                  if nb not in visited:
                      if has_cycle(nb, visited, stack): return True
                  elif nb in stack: return True
              stack.discard(node)
              return False

          cycles = [n for n in graph if has_cycle(n, set(), set())]
          for c in cycles: print(f"  ❌  Circular: {c}")
          if not cycles:   print("  ✅  No circular imports")
          open('a06.txt','w').write(str(len(cycles)))
          PYEOF
          echo "count=$(cat a06.txt)" >> $GITHUB_OUTPUT

      - name: 'A07 · Mixed HTTP/HTTPS Content'
        id: a07
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          # Allowed http:// patterns (SVG namespace, intentional demo content)
          ALLOW = ['w3.org/2000/svg', 'www.w3.org', 'schemas.microsoft', 'xmlns']
          base  = Path('frontend')
          errors = []

          for f in list(base.glob('*.js')) + list(base.glob('*.html')) + list(base.glob('ai/*.js')):
              if 'dist/assets' in str(f): continue
              src = f.read_text(errors='replace')
              for m in re.finditer(r'http://(?!localhost)([^\s"\'`>]+)', src):
                  url = m.group(0)
                  if not any(a in url for a in ALLOW):
                      # Get line number
                      line_no = src[:m.start()].count('\n') + 1
                      errors.append(f"{f.relative_to(base)} L{line_no}: {url[:70]}")

          for e in errors: print(f"  ❌  {e}")
          if not errors:   print("  ✅  No mixed HTTP/HTTPS content")
          open('a07.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a07.txt)" >> $GITHUB_OUTPUT

      - name: 'A08 · Broken Anchor Links'
        id: a08
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          errors = []

          for f in list(base.glob('*.html')) + list(base.glob('ai/*.html')):
              html    = f.read_text(errors='replace')
              defined = set(re.findall(r'id=["\']([^"\']+)["\']', html))
              hrefs   = re.findall(r'href=["\']#([^"\']+)["\']', html)
              for h in hrefs:
                  if h not in defined:
                      errors.append(f"{f.name}: href='#{h}' — id not found")

          for e in errors: print(f"  ❌  {e}")
          if not errors:   print("  ✅  All anchor links resolve")
          open('a08.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a08.txt)" >> $GITHUB_OUTPUT

      - name: 'A09 · Broken JSON Files'
        id: a09
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          files = (
              list(Path('frontend').glob('data_*.json')) +
              [Path('frontend/manifest.json'), Path('frontend/data_ai_config.json'),
               Path('frontend/data_meta.json'), Path('frontend/admin/package.json')]
          )
          errors = []
          for f in sorted(set(files)):
              if not f.exists(): continue
              try:
                  json.loads(f.read_text())
                  print(f"  ✓   {f}")
              except json.JSONDecodeError as e:
                  errors.append(f"{f}: {e}")
                  print(f"  ❌  {f}: {e}")
          if not errors:
              print("  ✅  All JSON files valid")
          open('a09.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a09.txt)" >> $GITHUB_OUTPUT

      - name: 'A10 · Render-Blocking Scripts'
        id: a10
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          errors = []

          for f in list(base.glob('*.html')) + list(base.glob('ai/*.html')):
              html  = f.read_text(errors='replace')
              head  = re.search(r'<head.*?</head>', html, re.DOTALL | re.I)
              if not head: continue
              head_html = head.group(0)
              # Find <script src=> without defer or async, not from CDN
              scripts = re.findall(r'<script([^>]*)>', head_html, re.I)
              for attrs in scripts:
                  has_src    = 'src=' in attrs
                  has_defer  = 'defer' in attrs
                  has_async  = 'async' in attrs
                  is_external = 'https://' in attrs or 'http://' in attrs
                  if has_src and not has_defer and not has_async and not is_external:
                      src_val = re.search(r'src=["\']([^"\']+)["\']', attrs)
                      src_val = src_val.group(1) if src_val else '?'
                      errors.append(f"{f.name}: blocking script → {src_val}")

          for e in errors: print(f"  ⚠   {e}")
          if not errors:   print("  ✅  No render-blocking scripts in <head>")
          open('a10.txt','w').write(str(len(errors)))
          PYEOF
          echo "count=$(cat a10.txt)" >> $GITHUB_OUTPUT

      # ══════════════════════════════════════════════════════════════════════
      # BLOCK B — DEAD CODE
      # ══════════════════════════════════════════════════════════════════════

      - name: 'B11 · Unused JS Files'
        id: b11
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base    = Path('frontend')
          EXEMPT  = {'sw.js'}  # registered via navigator.serviceWorker
          files   = [f for f in base.glob('*.js') if f.name not in EXEMPT]

          corpus  = '\n'.join(
              f.read_text(errors='replace') for f in
              list(base.glob('**/*.html')) + list(base.glob('**/*.js'))
              if 'dist' not in str(f)
          )
          corpus += '\n'.join(f.read_text(errors='replace') for f in Path('.github').glob('**/*.yml'))

          unused, used = [], []
          for f in sorted(files):
              (used if (f.name in corpus or '/'+f.name in corpus) else unused).append(f.name)

          for f in used:   print(f"  ✓   {f}")
          for f in unused: print(f"  ⚠   UNUSED: {f}  ({(base/f).stat().st_size} bytes)")
          if not unused:   print("  ✅  All JS files referenced")
          open('b11.txt','w').write(str(len(unused)))
          PYEOF
          echo "count=$(cat b11.txt)" >> $GITHUB_OUTPUT

      - name: 'B12 · Unused CSS Files'
        id: b12
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          files  = list(base.glob('*.css')) + list(base.glob('ai/*.css')) + list(base.glob('admin/*.css'))
          corpus = '\n'.join(
              f.read_text(errors='replace')
              for f in list(base.glob('**/*.html')) + list(base.glob('**/*.js'))
              if 'dist' not in str(f)
          )

          unused = []
          for f in sorted(files):
              name = f.name
              if name not in corpus:
                  unused.append(str(f.relative_to(base)))
                  print(f"  ⚠   UNUSED: {f.relative_to(base)}")
              else:
                  print(f"  ✓   {f.relative_to(base)}")
          if not unused: print("  ✅  All CSS files referenced")
          open('b12.txt','w').write(str(len(unused)))
          PYEOF
          echo "count=$(cat b12.txt)" >> $GITHUB_OUTPUT

      - name: 'B13 · Unused CSS Classes'
        id: b13
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          corpus = ''.join(
              f.read_text(errors='replace')
              for f in list(base.glob('**/*.html')) + list(base.glob('**/*.js'))
              if 'dist' not in str(f)
          )
          # Prefixes that are dynamic/state-driven — never literal in HTML
          DYNA = ('page-','is-','has-','nav-','tab-','term-','mob-','cyb-','shell',
                  'btn-','btn ','active','open','hidden','show','hide')

          total = 0
          for css_path in sorted(list(base.glob('*.css')) + list(base.glob('ai/*.css')) + list(base.glob('admin/*.css'))):
              css     = css_path.read_text(errors='replace')
              classes = list(set(re.findall(r'\.([a-zA-Z][a-zA-Z0-9_-]+)\s*[\{,:\[\s]', css)))
              unused  = [c for c in sorted(classes)
                         if c not in corpus and not any(c.startswith(p) for p in DYNA)]
              rel = str(css_path.relative_to(base))
              if unused:
                  total += len(unused)
                  print(f"\n  ⚠   {rel} — {len(unused)} unused class(es):")
                  for c in unused[:25]: print(f"       .{c}")
                  if len(unused) > 25: print(f"       ... +{len(unused)-25} more")
              else:
                  print(f"  ✅  {rel}")
          open('b13.txt','w').write(str(total))
          PYEOF
          echo "count=$(cat b13.txt)" >> $GITHUB_OUTPUT

      - name: 'B14 · Dead JS Functions'
        id: b14
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          corpus = ''.join(
              f.read_text(errors='replace')
              for f in list(base.glob('**/*.js')) + list(base.glob('**/*.html'))
              if 'dist' not in str(f)
          )

          total = 0
          check_files = list(base.glob('*.js')) + list(base.glob('admin/*.js'))
          for path in sorted(check_files):
              src     = path.read_text(errors='replace')
              named   = set(re.findall(r'\bfunction\s+([A-Za-z_$][A-Za-z0-9_$]*)\s*\(', src))
              exports = set(re.findall(r'window\.([A-Za-z_$][A-Za-z0-9_$]*)\s*=', src))
              dead    = []
              for fn in sorted(named - exports):
                  if len(re.findall(r'\b' + re.escape(fn) + r'\b', corpus)) <= 1:
                      for i, line in enumerate(src.splitlines(), 1):
                          if re.search(r'\bfunction\s+' + re.escape(fn) + r'\b', line):
                              dead.append((fn, i))
                              break
              if dead:
                  total += len(dead)
                  print(f"\n  ⚠   {path.name}: {len(dead)} possibly dead function(s):")
                  for fn, ln in dead: print(f"       L{ln:<5} {fn}()")
              else:
                  print(f"  ✓   {path.name}")
          open('b14.txt','w').write(str(total))
          PYEOF
          echo "count=$(cat b14.txt)" >> $GITHUB_OUTPUT

      - name: 'B15 · Dead JSON Keys'
        id: b15
        run: |
          python3 - <<'PYEOF'
          import json, re
          from pathlib import Path

          base   = Path('frontend')
          corpus = ''.join(
              f.read_text(errors='replace')
              for f in list(base.glob('**/*.js')) + list(base.glob('**/*.html'))
              if 'dist' not in str(f)
          )
          total = 0
          for jf in [base/'data_ai_config.json', base/'data_meta.json']:
              if not jf.exists(): continue
              data = json.loads(jf.read_text())
              if not isinstance(data, dict): continue
              dead = [k for k in data if k not in corpus]
              print(f"\n  {jf.name}:")
              for k in sorted(data):
                  icon = '⚠  UNUSED' if k in dead else '✓ '
                  print(f"    {icon}  {k}")
              total += len(dead)
          open('b15.txt','w').write(str(total))
          PYEOF
          echo "count=$(cat b15.txt)" >> $GITHUB_OUTPUT

      - name: 'B16 · Orphan Assets'
        id: b16
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base   = Path('frontend')
          SKIP   = {'certificates/auto','certificates/aws','cert_logos','dist','node_modules'}
          IMG_EXT= {'.png','.jpg','.jpeg','.gif','.webp','.svg','.ico'}
          corpus = ''.join(
              f.read_text(errors='replace')
              for f in list(base.glob('**/*.html')) + list(base.glob('**/*.js')) + list(base.glob('**/*.css'))
              if 'dist' not in str(f)
          )
          orphans, checked = [], 0
          for f in base.rglob('*'):
              if not f.is_file() or f.suffix.lower() not in IMG_EXT: continue
              rel = str(f.relative_to(base))
              if any(s in rel for s in SKIP): continue
              checked += 1
              if f.name not in corpus and f.stem not in corpus:
                  orphans.append(rel)

          print(f"  Checked {checked} image/icon files")
          for o in sorted(orphans):
              print(f"  ⚠   ORPHAN: {o}  ({(base/o).stat().st_size//1024}KB)")
          if not orphans: print("  ✅  No orphan assets")
          open('b16.txt','w').write(str(len(orphans)))
          PYEOF
          echo "count=$(cat b16.txt)" >> $GITHUB_OUTPUT

      - name: 'B17 · Duplicate CSS Rules'
        id: b17
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path
          from collections import Counter

          base   = Path('frontend')
          total  = 0
          for path in sorted(list(base.glob('*.css')) + list(base.glob('ai/*.css')) + list(base.glob('admin/*.css'))):
              css  = path.read_text(errors='replace')
              sels = [s.strip() for s in re.findall(r'([^{}\n@][^{}\n]*)\s*\{', css)
                      if s.strip() and not s.strip().startswith('@')]
              dups = {s:n for s,n in Counter(sels).items() if n > 1}
              rel  = str(path.relative_to(base))
              if dups:
                  total += len(dups)
                  print(f"\n  ⚠   {rel}: {len(dups)} duplicate rule(s):")
                  for sel, n in sorted(dups.items(), key=lambda x:-x[1])[:15]:
                      print(f"       x{n}  {sel[:70]}")
              else:
                  print(f"  ✅  {rel}")
          open('b17.txt','w').write(str(total))
          PYEOF
          echo "count=$(cat b17.txt)" >> $GITHUB_OUTPUT

      - name: 'B18 · Console.log Leaks'
        id: b18
        run: |
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          base    = Path('frontend')
          ALLOWED = {'sw.js', 'mobile.js'}    # intentional logging
          total   = 0
