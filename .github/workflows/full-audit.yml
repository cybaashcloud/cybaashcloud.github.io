              if 'dist/assets' in str(path): continue
              for i, line in enumerate(path.read_text(errors='replace').splitlines(), 1):
                  m = pattern.search(line)
                  if m:
                      by_tag[m.group(1)].append(f"{path.relative_to(base)}  L{i}  {m.group(2).strip()[:70]}")

          total = sum(len(v) for v in by_tag.values())
          for tag in TAGS:
              items = by_tag.get(tag, [])
              if items:
                  print(f"\n  [{tag}] ({len(items)}):")
                  for item in items: print(f"    {item}")
